name: Auto Fetch & Filter Live VPN Nodes

on:
  schedule:
    - cron: '0 * * * *'   # Chạy mỗi giờ — bắt kịp node mới từ các nguồn liên tục cập nhật
  workflow_dispatch:

# Tránh 2 lần chạy chồng nhau (VD: chạy trước chưa xong đã tới giờ chạy sau)
# gây tranh chấp khi git push cùng lúc.
concurrency:
  group: fetch-nodes
  cancel-in-progress: false

env:
  PYTHONUNBUFFERED: '1'

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install sing-box
        run: |
          TAG=$(curl -sL https://api.github.com/repos/SagerNet/sing-box/releases/latest \
               | grep '"tag_name"' | cut -d'"' -f4)
          VER=${TAG#v}
          wget -q "https://github.com/SagerNet/sing-box/releases/download/${TAG}/sing-box-${VER}-linux-amd64.tar.gz"
          tar xf sing-box-${VER}-linux-amd64.tar.gz
          sudo mv sing-box-${VER}-linux-amd64/sing-box /usr/local/bin/sing-box
          rm -rf sing-box-${VER}-linux-amd64*
          sing-box version

      - name: Download GeoLite2-Country
        run: |
          wget -q "https://github.com/P3TERX/GeoLite.mmdb/raw/download/GeoLite2-Country.mmdb"
          ls -lh GeoLite2-Country.mmdb

      - name: Run
        run: python get_sub.py

      - name: Commit & push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name  "github-actions[bot]"
          git add *_sub.txt
          git diff --cached --quiet \
            && echo "Không có thay đổi." \
            || git commit -m "chore: update nodes — $(date -u +'%Y-%m-%d %H:%M UTC')"
          git pull --rebase --autostash
          git push
