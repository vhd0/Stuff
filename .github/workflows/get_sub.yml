name: Auto Fetch & Filter Live VPN Nodes

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

env:
  PYTHONUNBUFFERED: '1'
  # Tier 3 (Fraud Score) — OPTIONAL. Đăng ký free tại ipqualityscore.com
  # (5,000 lookups/tháng, không cần thẻ), thêm secret IPQS_KEY vào repo
  # Settings → Secrets → Actions. Không set thì Tier 3 tự bỏ qua, pipeline
  # vẫn chạy đầy đủ Tier 1+2.
  IPQS_KEY: ${{ secrets.IPQS_KEY }}

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install sing-box
        run: |
          TAG=$(curl -sL https://api.github.com/repos/SagerNet/sing-box/releases/latest \
               | grep '"tag_name"' | cut -d'"' -f4)
          VER=${TAG#v}
          wget -q "https://github.com/SagerNet/sing-box/releases/download/${TAG}/sing-box-${VER}-linux-amd64.tar.gz"
          tar xf sing-box-${VER}-linux-amd64.tar.gz
          sudo mv sing-box-${VER}-linux-amd64/sing-box /usr/local/bin/sing-box
          rm -rf sing-box-${VER}-linux-amd64*
          sing-box version

      - name: Download GeoLite2-Country
        run: |
          wget -q "https://github.com/P3TERX/GeoLite.mmdb/raw/download/GeoLite2-Country.mmdb"
          ls -lh GeoLite2-Country.mmdb

      - name: Run
        run: python get_sub.py

      - name: Commit & push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name  "github-actions[bot]"
          git add *_sub.txt fraud_score_cache.json
          git diff --cached --quiet \
            && echo "No changes." \
            || git commit -m "chore: update nodes + fraud-score cache $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
