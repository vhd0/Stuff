name: Auto Fetch Shadowrocket Nodes

on:
  schedule:
    # Chạy lúc 00:00 UTC (07:00 sáng giờ VN) hàng ngày
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  fetch-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout mã nguồn
        uses: actions/checkout@v4

      - name: Thiết lập môi trường Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # Tối ưu tốc độ cài đặt thư viện cho các lần chạy sau

      - name: Cài đặt thư viện requests
        run: |
          pip install -r requirements.txt

      - name: Chạy script lấy node HK, JP, SG
        run: python get_sub.py

      - name: Đẩy các file node mới lên GitHub
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Lệnh này sẽ tự động nhận diện cả 3 file: hk_sub.txt, jp_sub.txt, sg_sub.txt
          git add *_sub.txt
          
          git commit -m "Auto-update nodes (HK, JP, SG) - $(date +'%Y-%m-%d %H:%M:%S')" || echo "Không có thay đổi dữ liệu"
          git push
