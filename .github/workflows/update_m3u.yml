name: Auto Update M3U Daily

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  
jobs:
  update-list:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v5

    - name: Install Real Browser Dependencies (Xvfb & SeleniumBase)
      run: |
        sudo apt-get update
        # Cài đặt công cụ tạo màn hình ảo
        sudo apt-get install -y xvfb
        python -m pip install --upgrade pip
        # Cài đặt thư viện điều khiển trình duyệt né trinh sát
        pip install seleniumbase
        # Tải Chromedriver
        seleniumbase install chromedriver

    - name: Fetch VNEPG API via Undetected Real Browser
      run: |
        cat << 'EOF' > get_vnepg.py
        import json
        import os
        import shutil
        import xml.etree.ElementTree as ET
        from seleniumbase import SB

        api_url = "https://vnepg.site/api/channels"
        xml_url = "https://vnepg.site/epg.xml"
        raw_file = "vnepg_raw.json"
        backup_file = "vnepg_backup.json"

        success = False

        print("Lớp 1: Khởi động Trình duyệt thật (SeleniumBase + Xvfb) để giải bài toán Cloudflare...")
        try:
            # uc=True: Bật chế độ qua mặt Anti-bot
            # xvfb=True: Bật màn hình ảo, giả lập như có người đang ngồi trước máy tính
            with SB(uc=True, xvfb=True, headless=False) as sb:
                sb.driver.get(api_url)
                print(" -> Đang nạp trang và chờ 10 giây để Cloudflare tự động xác thực JS Challenge...")
                sb.sleep(10)
                
                # Trình duyệt sẽ bọc chuỗi JSON trả về vào trong thẻ <body>
                page_text = sb.driver.find_element("css selector", "body").text
                
                try:
                    data = json.loads(page_text)
                    if "channels" in data and len(data["channels"]) > 0:
                        with open(raw_file, "w", encoding="utf-8") as f:
                            json.dump(data, f, ensure_ascii=False, indent=4)
                        with open(backup_file, "w", encoding="utf-8") as f:
                            json.dump(data, f, ensure_ascii=False, indent=4)
                        print(f" -> XUẤT SẮC! Trình duyệt thật đã vượt ải Turnstile, lấy được {len(data['channels'])} kênh.")
                        success = True
                except json.JSONDecodeError:
                    print(" -> Thất bại: Không thể đọc JSON. Có thể Cloudflare hiển thị Captcha yêu cầu Click thủ công.")
        except Exception as e:
            print(f" -> Lỗi trong quá trình chạy trình duyệt giả lập: {e}")

        # LỚP ĐỀ KHÁNG 2: Nếu giả lập lỗi, tìm file Backup cũ trong Repo
        if not success:
            print("Lớp 2: Đang tìm kiếm file sao lưu lịch sử [vnepg_backup.json] trên Repo...")
            if os.path.exists(backup_file):
                shutil.copy(backup_file, raw_file)
                print(" -> THÀNH CÔNG: Đã khôi phục toàn bộ danh mục và logo từ file Backup!")
                success = True
            else:
                print(" -> Thất bại: Không tìm thấy file Backup.")

        # LỚP ĐỀ KHÁNG 3: Cứu cánh bằng cấu trúc epg.xml công cộng
        if not success:
            print("Lớp 3: Kích hoạt chế độ khẩn cấp - Cào khung kênh từ cấu trúc epg.xml...")
            try:
                # Thử lấy XML bằng urllib cơ bản (vì file XML thường ít bị chặn gắt gao như API JSON)
                import urllib.request
                import ssl
                ctx = ssl._create_unverified_context()
                req_xml = urllib.request.Request(xml_url, headers={"User-Agent": "TiviMate/4.7.0"})
                with urllib.request.urlopen(req_xml, context=ctx, timeout=25) as response:
                    xml_data = response.read()
                    
                root = ET.fromstring(xml_data)
                channels_list = []
                for channel in root.findall('channel'):
                    ch_id = channel.get('id', '').strip()
                    display_elem = channel.find('display-name')
                    ch_name = display_elem.text.strip() if display_elem is not None and display_elem.text else ""
                    if ch_id and ch_name:
                        channels_list.append({"id": ch_id, "name": ch_name, "logo": ""})
                
                if channels_list:
                    with open(raw_file, "w", encoding="utf-8") as f:
                        json.dump({"channels": channels_list}, f, ensure_ascii=False, indent=4)
                    print(f" -> THÀNH CÔNG: Đã dựng tạm bộ khung {len(channels_list)} kênh từ XML.")
                    success = True
            except Exception as e:
                print(f" -> Thất bại: Không thể đọc cấu trúc XML ({e}).")

        if not success:
            print("Hệ thống sập toàn tập. Khởi tạo dữ liệu trống.")
            with open(raw_file, "w", encoding="utf-8") as f:
                json.dump({"channels": []}, f)
        EOF
        python3 get_vnepg.py

    - name: Process and Fully Merge M3U List
      run: |
        cat << 'EOF' > optimize_m3u.py
        import re
        import json
        import os
        from collections import OrderedDict
        import urllib.request

        urls = [
            "https://raw.githubusercontent.com/DinhLap96/ListTivi/refs/heads/main/ListTiVi/dltivi_v2.ndl",
            "https://raw.githubusercontent.com/iptv-org/iptv/refs/heads/master/streams/vn.m3u"
        ]

        channels = OrderedDict() 
        id_to_name_map = {}      
        name_to_id_map = {}      
        vnepg_id_to_logo = {}    

        RE_CLEAN_NAME = re.compile(r'\s*[\(\[][^\]\)]*[\)\]]')
        RE_NON_ALPHANUM = re.compile(r'[^a-z0-9]')
        RE_TVG_ID = re.compile(r'tvg-id="([^"]*)"')
        RE_GROUP = re.compile(r'group-title="([^"]*)"')
        RE_LOGO = re.compile(r'tvg-logo="([^"]*)"')

        def clean_tvg_id(raw_id):
            if not raw_id: return ""
            ch_id = raw_id.lower().replace(".vn", "").replace("@hd", "").replace("@sd", "").replace("@qhd", "")
            return RE_NON_ALPHANUM.sub('', ch_id).strip()

        def clean_channel_name(raw_name):
            if not raw_name: return ""
            name = RE_CLEAN_NAME.sub('', raw_name.lower())
            return RE_NON_ALPHANUM.sub('', name).strip()

        if os.path.exists("vnepg_raw.json"):
            try:
                with open("vnepg_raw.json", "r", encoding="utf-8") as f:
                    raw_data = json.load(f)
                    for ch in raw_data.get("channels", []):
                        ch_id = str(ch.get("id", "")).strip()
                        ch_name = str(ch.get("name", "")).strip()
                        ch_logo = str(ch.get("logo", "")).strip()
                        if ch_id and ch_name:
                            channels[ch_name] = {"tvg-id": ch_id, "group-title": "Truyền Hình", "tvg-logo": ch_logo, "urls": []}
                            if ch_logo: vnepg_id_to_logo[ch_id] = ch_logo
                            id_to_name_map[clean_tvg_id(ch_id)] = ch_name
                            name_to_id_map[clean_channel_name(ch_name)] = ch_id
                print(f"Đã dựng thành công bộ khung {len(channels)} kênh từ dữ liệu tiếp nhận.")
            except Exception:
                print("Chạy chế độ gộp thô danh sách.")

        def parse_attributes(line):
            tvg_id = group_title = tvg_logo = ""
            id_match = RE_TVG_ID.search(line)
            group_match = RE_GROUP.search(line)
            logo_match = RE_LOGO.search(line)
            
            if id_match: tvg_id = id_match.group(1).strip()
            if group_match: group_title = group_match.group(1).strip()
            if logo_match: tvg_logo = logo_match.group(1).strip()
            
            raw_name = line.rsplit(",", 1)[1].strip() if "," in line else ""
            clean_name = RE_CLEAN_NAME.sub('', raw_name)
            return tvg_id, group_title, tvg_logo, " ".join(clean_name.split()).strip()

        used_urls = set()

        for url in urls:
            print(f"Đang đồng bộ luồng từ nguồn: {url}")
            req = urllib.request.Request(url, headers={"User-Agent": "Mozilla/5.0"})
            try:
                with urllib.request.urlopen(req) as response:
                    content = response.read().decode("utf-8-sig")
            except Exception as e:
                print(f" -> Lỗi tải nguồn {url}: {e}")
                continue

            lines = content.splitlines()
            last_key = None

            for line in lines:
                line_str = line.strip()
                if not line_str or line_str.startswith("#EXTM3U") or line_str.startswith("#PLAYLISTINF"): continue
                
                if line_str.startswith("#EXTINF"):
                    tvg_id, group_title, tvg_logo, clean_name = parse_attributes(line_str)
                    raw_norm_id = clean_tvg_id(tvg_id)
                    raw_norm_name = clean_channel_name(clean_name)
                    
                    matched_standard_name = None
                    if raw_norm_id in id_to_name_map:
                        matched_standard_name = id_to_name_map[raw_norm_id]
                    elif raw_norm_name in name_to_id_map:
                        matched_standard_name = id_to_name_map.get(clean_tvg_id(name_to_id_map[raw_norm_name]))

                    if matched_standard_name:
                        key = matched_standard_name
                        if group_title and group_title != "Truyền Hình": channels[key]["group-title"] = group_title
                    else:
                        key = clean_name if clean_name else (tvg_id if tvg_id else "Kênh Phụ")
                        if key not in channels:
                            channels[key] = {"tvg-id": tvg_id, "group-title": group_title if group_title else "Kênh Phụ", "tvg-logo": tvg_logo, "urls": []}
                    last_key = key
                    
                elif line_str.startswith("http://") or line_str.startswith("https://"):
                    if last_key and last_key in channels:
                        if line_str not in used_urls:
                            channels[last_key]["urls"].append(line_str)
                            used_urls.add(line_str)

        output_lines = ["#EXTM3U url-tvg=\"https://vnepg.site/epg.xml\""]

        for name, info in channels.items():
            urls_list = info["urls"]
            if not urls_list: continue 
            
            final_logo = info["tvg-logo"]
            current_id = info["tvg-id"]
            if current_id in vnepg_id_to_logo:
                final_logo = vnepg_id_to_logo[current_id]
            
            attrs = []
            if current_id: attrs.append(f'tvg-id="{current_id}"')
            if info["group-title"]: attrs.append(f'group-title="{info["group-title"]}"')
            if final_logo: attrs.append(f'tvg-logo="{final_logo}"')
            attr_str = " " + " ".join(attrs)
            
            output_lines.append(f"#EXTINF:-1{attr_str},{name}")
            output_lines.append(urls_list[0])
            
            for i, url_bak in enumerate(urls_list[1:], start=1):
                output_lines.append(f"#EXTINF:-1{attr_str},{name} [Dự phòng {i}]")
                output_lines.append(url_bak)

        with open("listtivi.m3u", "w", encoding="utf-8") as f:
            f.write("\n".join(output_lines) + "\n")
        print(" Quá trình tạo danh sách kết thúc hoàn hảo!")
        EOF
        python3 optimize_m3u.py

    - name: Commit and Push changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add "listtivi.m3u" "vnepg_backup.json" || true
        if git diff --staged --quiet; then
          echo "Không phát hiện thay đổi."
        else
          git commit -m "Auto-update & Đột phá tường lửa bằng Trình Duyệt Thật (SeleniumBase)"
          git push
        fi
