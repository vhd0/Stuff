name: Auto Update M3U Daily

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  
jobs:
  update-list:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v5

    - name: Fetch and Fully Optimize M3U
      run: |
        cat << 'EOF' > optimize_m3u.py
        import urllib.request
        import re
        import json
        from collections import OrderedDict

        urls = [
            "https://raw.githubusercontent.com/DinhLap96/ListTivi/refs/heads/main/ListTiVi/dltivi_v2.ndl",
            "https://raw.githubusercontent.com/iptv-org/iptv/refs/heads/master/streams/vn.m3u"
        ]

        channels = OrderedDict() 
        id_to_name_map = {}      # Ánh xạ: id_chuan_hoa -> Tên chuẩn VNEPG
        name_to_id_map = {}      # Ánh xạ: tên_chuan_hoa -> ID gốc VNEPG
        vnepg_id_to_logo = {}    # CHỐT CHẶN: Ánh xạ chuẩn tvg-id gốc -> Logo VNEPG chuẩn

        # HÀM CHUẨN HÓA ID GỐC (Xóa sạch đuôi rác .vn, @HD, @SD, ký tự đặc biệt)
        def clean_tvg_id(raw_id):
            if not raw_id:
                return ""
            ch_id = raw_id.lower()
            ch_id = ch_id.replace(".vn", "").replace("@hd", "").replace("@sd", "").replace("@qhd", "")
            ch_id = re.sub(r'[^a-z0-9]', '', ch_id) # Chỉ giữ lại chữ cái và số
            return ch_id.strip()

        # HÀM CHUẨN HÓA TÊN KÊNH (Để làm phương án so khớp dự phòng)
        def clean_channel_name(raw_name):
            if not raw_name:
                return ""
            name = raw_name.lower()
            name = re.sub(r'\s*[\(\[][^\]\)]*[\)\]]', '', name) # Xóa (1080p), [Geo-blocked]
            name = re.sub(r'[^a-z0-9]', '', name) # Xóa khoảng trắng, dấu
            return name.strip()

        # 1. TẢI VÀ KHỞI TẠO BỘ KHUNG TỪ VNEPG API
        print("Đang tải dữ liệu gốc từ VNEPG API...")
        try:
            req_epg = urllib.request.Request("https://vnepg.site/api/channels", headers={"User-Agent": "Mozilla/5.0"})
            with urllib.request.urlopen(req_epg) as response:
                raw_data = json.loads(response.read().decode("utf-8"))
                epg_channels = raw_data.get("channels", [])
                
                for ch in epg_channels:
                    ch_id = str(ch.get("id", "")).strip()
                    ch_name = str(ch.get("name", "")).strip()
                    ch_logo = str(ch.get("logo", "")).strip()
                    
                    if ch_id and ch_name:
                        key = ch_name 
                        channels[key] = {
                            "tvg-id": ch_id, 
                            "group-title": "Truyền Hình", 
                            "tvg-logo": ch_logo,
                            "urls": []
                        }
                        
                        # Lưu kho logo chuẩn theo ID gốc của VNEPG
                        vnepg_id_to_logo[ch_id] = ch_logo
                        
                        # Tạo bảng tra cứu bằng ID chuẩn hóa và Tên chuẩn hóa
                        norm_id = clean_tvg_id(ch_id)
                        norm_name = clean_channel_name(ch_name)
                        
                        if norm_id:
                            id_to_name_map[norm_id] = ch_name
                        if norm_name:
                            name_to_id_map[norm_name] = ch_id
                            
            print(f" Đã nạp {len(channels)} kênh gốc từ VNEPG.")
        except Exception as e:
            print(f" Lỗi tải VNEPG API ({e}).")

        # Hàm bóc tách thuộc tính từ dòng text M3U/NDL raw
        def parse_attributes(line):
            tvg_id = ""
            group_title = ""
            tvg_logo = ""
            
            id_match = re.search(r'tvg-id="([^"]*)"', line)
            group_match = re.search(r'group-title="([^"]*)"', line)
            logo_match = re.search(r'tvg-logo="([^"]*)"', line)
            
            if id_match: tvg_id = id_match.group(1).strip()
            if group_match: group_title = group_match.group(1).strip()
            if logo_match: tvg_logo = logo_match.group(1).strip()
            
            raw_name = ""
            if "," in line:
                raw_name = line.rsplit(",", 1)[1].strip()
            
            clean_name = re.sub(r'\s*[\(\[][^\]\)]*[\)\]]', '', raw_name)
            clean_name = " ".join(clean_name.split()).strip()
            
            return tvg_id, group_title, tvg_logo, clean_name

        # 2. ĐỒNG BỘ DỮ LIỆU TỪ 2 LINK RAW VỚI THUẬT TOÁN ÁNH XẠ KÉP
        used_urls = set()

        for url in urls:
            print(f"Đang đồng bộ luồng từ nguồn: {url}")
            req = urllib.request.Request(url, headers={"User-Agent": "Mozilla/5.0"})
            
            try:
                with urllib.request.urlopen(req) as response:
                    content = response.read().decode("utf-8-sig")
            except Exception as e:
                print(f" Lỗi tải nguồn {url}: {e}")
                continue

            lines = content.splitlines()
            last_key = None

            for line in lines:
                line_str = line.strip()
                if not line_str or line_str.startswith("#EXTM3U") or line_str.startswith("#PLAYLISTINF"):
                    continue
                
                if line_str.startswith("#EXTINF"):
                    tvg_id, group_title, tvg_logo, clean_name = parse_attributes(line_str)
                    
                    raw_norm_id = clean_tvg_id(tvg_id)
                    raw_norm_name = clean_channel_name(clean_name)
                    
                    matched_standard_name = None
                    
                    if raw_norm_id in id_to_name_map:
                        matched_standard_name = id_to_name_map[raw_norm_id]
                    elif raw_norm_name in name_to_id_map:
                        standard_id = name_to_id_map[raw_norm_name]
                        matched_standard_name = id_to_name_map.get(clean_tvg_id(standard_id))

                    if matched_standard_name:
                        key = matched_standard_name
                        if group_title and group_title != "Truyền Hình":
                            channels[key]["group-title"] = group_title
                    else:
                        key = clean_name if clean_name else (tvg_id if tvg_id else "Kênh Phụ")
                        if key not in channels:
                            channels[key] = {
                                "tvg-id": tvg_id,
                                "group-title": group_title if group_title else "Kênh Phụ",
                                "tvg-logo": tvg_logo,
                                "urls": []
                            }
                    
                    last_key = key
                    
                elif line_str.startswith("http://") or line_str.startswith("https://"):
                    if last_key and last_key in channels:
                        if line_str in used_urls:
                            continue
                        if line_str not in channels[last_key]["urls"]:
                            channels[last_key]["urls"].append(line_str)
                            used_urls.add(line_str)

        # 3. XUẤT FILE M3U - ÉP CHẶN ĐỂ ƯU TIÊN LOGO VNEPG HÀNG ĐẦU
        output_lines = ["#EXTM3U url-tvg=\"https://vnepg.site/epg.xml\""]

        for name, info in channels.items():
            urls_list = info["urls"]
            if not urls_list:
                continue 
            
            # KIỂM TRA ĐÈ: Nếu tvg-id của kênh nằm trong kho VNEPG, bắt buộc lấy logo VNEPG
            final_logo = info["tvg-logo"]
            current_id = info["tvg-id"]
            if current_id in vnepg_id_to_logo:
                final_logo = vnepg_id_to_logo[current_id]
            
            attrs = []
            if current_id: attrs.append(f'tvg-id="{current_id}"')
            if info["group-title"]: attrs.append(f'group-title="{info["group-title"]}"')
            if final_logo: attrs.append(f'tvg-logo="{final_logo}"')
            
            attr_str = " " + " ".join(attrs)
            
            # Xuất luồng phát chính
            output_lines.append(f"#EXTINF:-1{attr_str},{name}")
            output_lines.append(urls_list[0])
            
            # Xuất các luồng dự phòng
            for i, url_bak in enumerate(urls_list[1:], start=1):
                output_lines.append(f"#EXTINF:-1{attr_str},{name} [Dự phòng {i}]")
                output_lines.append(url_bak)

        with open("listtivi.m3u", "w", encoding="utf-8") as f:
            f.write("\n".join(output_lines) + "\n")

        print(" Đã ép chặn ưu tiên và ghi đè Logo VNEPG thành công!")
        EOF
        python3 optimize_m3u.py

    - name: Commit and Push changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add "listtivi.m3u"
        
        if git diff --staged --quiet; then
          echo "Không phát hiện thay đổi."
        else
          git commit -m "Auto-update & Fix cứng ép ưu tiên Logo VNEPG"
          git push
        fi
