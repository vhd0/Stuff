            "Lạng Sơn Radio": ["lạng sơn radio", "langsonradio"], "Lâm Đồng Radio 1": ["lâm đồng radio 1", "lamdongradio1"],
            "Lâm Đồng Radio 2": ["lâm đồng radio 2", "lamdongradio2"], "Nghệ An Radio": ["nghệ an radio", "ngheanradio"],
            "Ninh Bình Radio": ["ninh bình radio", "ninhbinhradio"], "Quảng Ninh Radio 1": ["quảng ninh radio 1", "quangninhradio1"],
            "Quảng Ninh Radio 2": ["quảng ninh radio 2", "quangninhradio2"], "Quảng Trị Radio": ["quảng trị radio", "quangtriradio"],
            "Sơn La Radio": ["sơn la radio", "sonlaradio"], "Tây Ninh Radio": ["tây ninh radio", "tayninhradio"],
            "Thái Nguyên Radio": ["thái nguyên radio", "thainguyenradio"], "Thanh Hoá Radio": ["thanh hoá radio", "thanhhoaradio"],
            "Vĩnh Long Radio": ["vĩnh long radio", "vinhlongradio"]
        }

        # ĐỊNH NGHĨA THỨ TỰ ƯU TIÊN CÁC NHÓM XUẤT FILE
        GROUP_ORDER = ["VTV", "HTV", "SCTV", "Kênh Đặc Biệt", "Địa Phương", "Radio"]

        # 1. NẠP MAPPING TỪ FILE BACKUP JSON CỦA BẠN
        registry = {}
        try:
            with open("vnepg_backup.json", "r", encoding="utf-8") as f:
                raw_data = json.load(f)
                for ch in raw_data.get("channels", []):
                    registry[ch.get("id")] = ch
        except Exception as e:
            print(f"Lỗi nạp JSON (Sẽ bỏ qua lấy dữ liệu từ JSON): {e}")

        # Hàm đưa tên thô về Tên Chuẩn dựa trên CHANNEL_MAP
        def get_canonical_name(raw_name):
            clean = re.sub(r'\(.*?\)|\[.*?\]', '', raw_name)
            clean = re.sub(r'\b(hd|sd|4k|1080p|720p)\b', '', clean, flags=re.IGNORECASE)
            clean = re.sub(r'(hd|sd|4k)$', '', clean.strip(), flags=re.IGNORECASE)
            clean = " ".join(clean.split()).strip().lower()
            
            for canonical, variants in CHANNEL_MAP.items():
                if clean == canonical.lower() or clean in [v.lower() for v in variants]:
                    return canonical
            return re.sub(r'\(.*?\)|\[.*?\]', '', raw_name).strip()

        # 2. LOGIC PHÂN NHÓM CHUẨN ĐÚNG THEO THỨ TỰ ƯU TIÊN
        def get_group(name, id_json):
            name_lower = name.lower()
            if "vietnam today" in name_lower: return "VTV"
            if any(x in name_lower for x in ["vtv1", "vtv2", "vtv3", "vtv4", "vtv5", "vtv6", "vtv7", "vtv8", "vtv9", "vtv10", "vtv"]): return "VTV"
            if "htv" in name_lower: return "HTV"
            if "sctv" in name_lower: return "SCTV"
            if any(x in name_lower for x in ["antv", "an ninh", "qpvn", "quốc phòng"]): return "Kênh Đặc Biệt"
            if any(x in name_lower for x in ["vov", "radio", "fm", "am", "zing", "xone"]): return "Radio"
            if id_json and "radio" in id_json.lower(): return "Radio"
            return "Địa Phương"

        # 3. GOM DỮ LIỆU ĐA NGUỒN TẬP TRUNG
        raw_collected = {}
        urls = [
            "https://raw.githubusercontent.com/DinhLap96/ListTivi/refs/heads/main/ListTiVi/dltivi_v2.ndl",
            "https://raw.githubusercontent.com/iptv-org/iptv/refs/heads/master/streams/vn.m3u"
        ]

        for url in urls:
            try:
                req = urllib.request.Request(url, headers={"User-Agent": "Mozilla/5.0"})
                content = urllib.request.urlopen(req, timeout=15).read().decode("utf-8-sig")
                
                # Biểu thức chính quy tách từng cụm cặp thẻ #EXTINF và URL đường dẫn link kênh phát
                chunks = re.findall(r'(#EXTINF:[^\n]*),(.*?)\n(https?://.*?\.m3u8?)', content)
                
                for extinf_line, raw_name, link in chunks:
                    name = get_canonical_name(raw_name)
                    
                    # Trích xuất tự động thẻ tvg-logo từ dòng #EXTINF thô bất kể vị trí của nó nằm ở đâu
                    raw_logo = ""
                    logo_match = re.search(r'tvg-logo="([^"]*)"', extinf_line, re.IGNORECASE)
                    if logo_match:
                        raw_logo = logo_match.group(1).strip()
                    
                    # Đối chiếu dữ liệu gốc từ JSON backup của bạn
                    tvg_id, json_logo = "", ""
                    for ch_id, ch_obj in registry.items():
                        if ch_obj.get("name").lower() == name.lower():
                            tvg_id = ch_obj.get("id", "")
                            json_logo = ch_obj.get("logo", "").strip()
                            break
                    
                    # ĐỘNG LỰC ƯU TIÊN LOGO: Nếu JSON có sẵn logo -> dùng JSON. Nếu JSON trống -> dùng logo của file thô
                    final_logo = json_logo if json_logo else raw_logo
                    
                    group = get_group(name, tvg_id)
                    
                    if name not in raw_collected:
                        raw_collected[name] = {"group": group, "id": tvg_id, "logo": final_logo, "urls": []}
                    else:
                        # Nếu kênh đã tồn tại trong lượt quét trước nhưng chưa có logo, lập tức cập nhật logo thô mới tìm thấy
                        if not raw_collected[name]["logo"] and final_logo:
                            raw_collected[name]["logo"] = final_logo
                    
                    if link not in raw_collected[name]["urls"]:
                        raw_collected[name]["urls"].append(link)
            except Exception as e:
                print(f"Lỗi xử lý nguồn {url}: {e}")
                continue

        # SẮP XẾP TOÀN BỘ KÊNH TUẦN TỰ THEO NHÓM VÀ TÊN ALPHABET
        final_data = OrderedDict()
        for g in GROUP_ORDER:
            sorted_channels_in_group = sorted(
                [k for k, v in raw_collected.items() if v["group"] == g],
                key=lambda s: [int(t) if t.isdigit() else t.lower() for t in re.split(r'(\d+)', s)]
            )
            for ch_name in sorted_channels_in_group:
                final_data[ch_name] = raw_collected[ch_name]

        remains = sorted([k for k, v in raw_collected.items() if v["group"] not in GROUP_ORDER])
        for ch_name in remains:
            final_data[ch_name] = raw_collected[ch_name]

        # 4. XUẤT FILE M3U HOÀN CHỈNH VỚI THỨ TỰ TUẦN TỰ
        with open("listtivi.m3u", "w", encoding="utf-8") as f:
            f.write('#EXTM3U url-tvg="https://vnepg.site/epg.xml.gz"\n')
            for name, data in final_data.items():
                if not data["urls"]: continue
                
                tvg = ""
                if data["id"]: tvg += f' tvg-id="{data["id"]}"'
                if data["logo"]: tvg += f' tvg-logo="{data["logo"]}"'
                
                for idx, url in enumerate(data["urls"]):
                    suffix = f" [Dự phòng {idx+1}]" if idx > 0 else ""
                    f.write(f'#EXTINF:-1{tvg} group-title="{data["group"]}",{name}{suffix}\n{url}\n')
        print("Đã vá lỗi và đồng bộ hóa toàn bộ logo thô thành công!")
        EOF
        python3 optimize_m3u.py
        
