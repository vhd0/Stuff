name: Auto Update M3U Daily

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-list:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5

    - name: Process and Merge M3U
      run: |
        cat << 'EOF' > optimize_m3u.py
        import json, os, urllib.request, re
        from collections import OrderedDict

        # 1. HÀM PHÂN NHÓM TỰ ĐỘNG
        def determine_group(name):
            n = name.lower()
            if "fm" in n: return "Radio FM"
            # Danh sách từ khóa địa phương
            local_keywords = ["tv", "đà nẵng", "cần thơ", "vĩnh long", "hà nội", "hà tĩnh", 
                              "nghệ an", "đắk lắk", "lâm đồng", "quảng ngãi", "tây ninh", 
                              "thái nguyên", "lào cai", "điện biên", "cao bằng", "an giang", "cà mau"]
            if any(key in n for key in local_keywords): return "Địa Phương"
            if "vtv" in n: return "VTV"
            if "htv" in n: return "HTV"
            if "sctv" in n: return "SCTV"
            return "Khác"

        # 2. ĐỌC DỮ LIỆU TỪ BACKUP
        registry = {}
        if os.path.exists("vnepg_backup.json"):
            try:
                with open("vnepg_backup.json", "r", encoding="utf-8") as f:
                    for ch in json.load(f).get("channels", []):
                        registry[re.sub(r'[^a-z0-9]', '', ch["name"].lower())] = ch
            except: pass

        # 3. GOM NHÓM KÊNH
        channels = OrderedDict()
        used_urls = set()
        urls = ["https://raw.githubusercontent.com/DinhLap96/ListTivi/refs/heads/main/ListTiVi/dltivi_v2.ndl", 
                "https://raw.githubusercontent.com/iptv-org/iptv/refs/heads/master/streams/vn.m3u"]

        for url in urls:
            try:
                lines = urllib.request.urlopen(urllib.request.Request(url, headers={"User-Agent": "Mozilla/5.0"})).read().decode("utf-8-sig").splitlines()
                current_key = None
                for line in lines:
                    if line.startswith("#EXTINF"):
                        raw_name = line.rsplit(",", 1)[-1].strip()
                        key = re.sub(r'[^a-z0-9]', '', raw_name.lower())
                        
                        if key not in channels:
                            group = determine_group(raw_name)
                            info = registry.get(key, {"id": "", "logo": ""})
                            channels[key] = {"name": raw_name, "group": group, "id": info.get("id", ""), "logo": info.get("logo", ""), "urls": []}
                        current_key = key
                    elif current_key and line.startswith("http"):
                        if line not in used_urls:
                            channels[current_key]["urls"].append(line)
                            used_urls.add(line)
            except: pass

        # 4. GHI FILE M3U
        with open("listtivi.m3u", "w", encoding="utf-8") as f:
            f.write("#EXTM3U\n")
            for key, data in channels.items():
                for i, url in enumerate(data["urls"]):
                    suffix = f" [Dự phòng {i}]" if i > 0 else ""
                    f.write(f'#EXTINF:-1 tvg-id="{data["id"]}" tvg-logo="{data["logo"]}" group-title="{data["group"]}",{data["name"]}{suffix}\n{url}\n')
        EOF
        python3 optimize_m3u.py

    - name: Push Changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add "listtivi.m3u"
        git commit -m "Auto-update list: Phân nhóm Địa Phương & FM thông minh" || echo "No changes"
        git push
