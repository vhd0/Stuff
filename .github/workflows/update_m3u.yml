name: Auto Update M3U Daily

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-list:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5

    - name: Process and Merge M3U
      run: |
        cat << 'EOF' > optimize_m3u.py
        import re, urllib.request
        from collections import OrderedDict

        # HÀM PHÂN NHÓM CHUYÊN NGHIỆP
        def get_group_and_name(raw_name):
            n = raw_name.lower()
            clean = re.sub(r'\(.*?\)|\[.*?\]', '', raw_name).strip()
            
            # Nhóm Đặc biệt
            if any(x in n for x in ["an ninh", "antv", "quốc phòng", "qpvn"]):
                return clean, "Kênh Đặc Biệt"
            
            # Nhóm VTV (Bao gồm các kênh con)
            if "vtv" in n:
                return clean, "VTV"
                
            # Nhóm HTV
            if "htv" in n:
                return clean, "HTV"
                
            # Nhóm SCTV
            if "sctv" in n:
                return clean, "SCTV"
            
            # Nhóm Radio
            if any(x in n for x in ["fm", "vov", "radio", "xone"]):
                return clean, "Radio & FM"
            
            # Mặc định là Địa Phương
            return clean, "Địa Phương"

        # CẤU HÌNH ĐA NGUỒN
        urls = [
            "https://raw.githubusercontent.com/DinhLap96/ListTivi/refs/heads/main/ListTiVi/dltivi_v2.ndl",
            "https://raw.githubusercontent.com/iptv-org/iptv/refs/heads/master/streams/vn.m3u"
        ]
        
        channels = OrderedDict()
        for url in urls:
            try:
                req = urllib.request.Request(url, headers={"User-Agent": "Mozilla/5.0"})
                content = urllib.request.urlopen(req, timeout=15).read().decode("utf-8-sig")
                
                # Regex tách block EXTINF và URL chính xác
                pattern = re.compile(r'#EXTINF:.*?,(.*?)\n(https?://.*?\.m3u8?)', re.IGNORECASE)
                matches = pattern.findall(content)
                
                for raw_name, url_link in matches:
                    name, group = get_group_and_name(raw_name)
                    if name not in channels:
                        channels[name] = {"group": group, "urls": []}
                    if url_link not in channels[name]["urls"]:
                        channels[name]["urls"].append(url_link)
            except: continue

        # GHI FILE
        with open("listtivi.m3u", "w", encoding="utf-8") as f:
            f.write("#EXTM3U\n")
            for name, data in channels.items():
                for i, url in enumerate(data["urls"]):
                    suffix = f" [Dự phòng {i}]" if i > 0 else ""
                    f.write(f'#EXTINF:-1 group-title="{data["group"]}",{name}{suffix}\n{url}\n')
        EOF
        python3 optimize_m3u.py

    - name: Push Changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add "listtivi.m3u"
        git commit -m "Update: Phân nhóm đặc biệt và đồng bộ nhóm VTV" || echo "No changes"
        git push
