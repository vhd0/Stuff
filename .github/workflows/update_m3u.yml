name: Auto Update M3U Daily

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-list:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5

    - name: Process and Merge M3U
      run: |
        cat << 'EOF' > optimize_m3u.py
        import re, json, urllib.request
        from collections import OrderedDict

        # 1. NẠP MAPPING JSON
        registry = {}
        try:
            with open("vnepg_backup.json", "r", encoding="utf-8") as f:
                data = json.load(f)
                for ch in data.get("channels", []):
                    key = re.sub(r'[^a-z0-9]', '', ch.get("name", "").lower())
                    registry[key] = ch
        except: pass

        # 2. LOGIC PHÂN NHÓM CHUẨN (Vietnam Today -> VTV)
        def get_group(name_lower):
            if "vietnam today" in name_lower: return "VTV"
            if any(x in name_lower for x in ["vtv1", "vtv2", "vtv3", "vtv4", "vtv5", "vtv6", "vtv7", "vtv8", "vtv9", "vtv"]): return "VTV"
            if "htv" in name_lower: return "HTV"
            if "sctv" in name_lower: return "SCTV"
            if any(x in name_lower for x in ["antv", "an ninh", "qpvn", "quốc phòng"]): return "Kênh Đặc Biệt"
            if any(x in name_lower for x in ["vov", "radio", "fm", "am", "zing"]): return "Radio"
            return "Địa Phương"

        # 3. GOM DỮ LIỆU
        final_data = OrderedDict()
        urls = [
            "https://raw.githubusercontent.com/DinhLap96/ListTivi/refs/heads/main/ListTiVi/dltivi_v2.ndl",
            "https://raw.githubusercontent.com/iptv-org/iptv/refs/heads/master/streams/vn.m3u"
        ]

        for url in urls:
            try:
                content = urllib.request.urlopen(url, timeout=15).read().decode("utf-8-sig")
                matches = re.findall(r'#EXTINF:.*?,(.*?)\n(https?://.*?\.m3u8?)', content)
                for raw_name, link in matches:
                    norm_key = re.sub(r'[^a-z0-9]', '', raw_name.lower())
                    
                    if norm_key in registry:
                        item = registry[norm_key]
                        name = item.get("name")
                        tvg_id = item.get("id", "")
                        logo = item.get("logo", "")
                    else:
                        name = raw_name.strip()
                        tvg_id = ""
                        logo = ""
                    
                    group = get_group(name.lower())
                    
                    if name not in final_data:
                        final_data[name] = {"group": group, "id": tvg_id, "logo": logo, "urls": []}
                    
                    if link not in final_data[name]["urls"]:
                        final_data[name]["urls"].append(link)
            except: continue

        # 4. XUẤT FILE VỚI EPG HEADER
        with open("listtivi.m3u", "w", encoding="utf-8") as f:
            # Header cho EPG (Bạn có thể thay đổi link xmltv nếu cần)
            f.write('#EXTM3U url-tvg="https://vnepg.site/epg.xml.gz"\n')
            for name, data in final_data.items():
                tvg = f' tvg-id="{data["id"]}" tvg-logo="{data["logo"]}"' if data["id"] else ""
                for idx, url in enumerate(data["urls"]):
                    suffix = f" [Dự phòng {idx+1}]" if idx > 0 else ""
                    f.write(f'#EXTINF:-1{tvg} group-title="{data["group"]}",{name}{suffix}\n{url}\n')
        EOF
        python3 optimize_m3u.py
        
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add "listtivi.m3u"
        git commit -m "Update: Vietnam Today to VTV and EPG header added" || echo "No changes"
        git push
