name: Auto Update M3U Daily

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  
jobs:
  update-list:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v5

    - name: Install ffmpeg (ffprobe)
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg

    - name: Fetch VNEPG API via Vietnam Proxy
      run: |
        cat << 'EOF' > get_vnepg.py
        import urllib.request
        import json
        import re
        import os

        print("Đang tìm kiếm Proxy Việt Nam hoạt động...")
        proxy_list = []
        try:
            req = urllib.request.Request("https://api.proxyscrape.com/v2/?request=displayproxies&protocol=http&timeout=10000&country=VN&ssl=all&anonymity=all", headers={"User-Agent": "Mozilla/5.0"})
            with urllib.request.urlopen(req, timeout=10) as response:
                proxies = response.read().decode("utf-8").strip().splitlines()
                proxy_list = [p.strip() for p in proxies if p.strip()]
            print(f"Tìm thấy {len(proxy_list)} Proxy Việt Nam tiềm năng.")
        except Exception as e:
            print(f"Không thể lấy danh sách proxy tự động ({e}).")

        proxy_list.extend([
            "103.199.161.4:80",
            "14.226.54.3:8080",
            "113.160.222.115:80"
        ])

        success = False
        api_url = "https://vnepg.site/api/channels"
        
        for proxy in proxy_list:
            print(f"Thử kết nối tới VNEPG qua Proxy VN: {proxy} ...")
            try:
                proxy_support = urllib.request.ProxyHandler({'http': proxy, 'https': proxy})
                opener = urllib.request.build_opener(proxy_support)
                opener.addheaders = [
                    ("User-Agent", "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"),
                    ("Accept", "application/json, text/plain, */*"),
                    ("Accept-Language", "vi-VN,vi;q=0.9,en-US;q=0.8,en;q=0.7")
                ]
                with opener.open(api_url, timeout=7) as response:
                    data = json.loads(response.read().decode("utf-8"))
                    if "channels" in data:
                        with open("vnepg_raw.json", "w", encoding="utf-8") as f:
                            json.dump(data, f, ensure_ascii=False, indent=4)
                        print(" CHÚC MỪNG! Đã tải thành công dữ liệu VNEPG qua Proxy Việt Nam.")
                        success = True
                        break
            except Exception as e:
                print(f" -> Proxy {proxy} lỗi. Thử proxy khác...")
                continue

        if not success:
            print(" CẢNH BÁO: Thất bại. Khởi tạo file rỗng.")
            with open("vnepg_raw.json", "w", encoding="utf-8") as f:
                json.dump({"channels": []}, f)
        EOF
        python3 get_vnepg.py

    - name: Process, Check Live Streams and Fully Optimize M3U
      run: |
        cat << 'EOF' > optimize_m3u.py
        import re
        import json
        import os
        import subprocess
        from collections import OrderedDict
        from concurrent.futures import ThreadPoolExecutor

        urls = [
            "https://raw.githubusercontent.com/DinhLap96/ListTivi/refs/heads/main/ListTiVi/dltivi_v2.ndl",
            "https://raw.githubusercontent.com/iptv-org/iptv/refs/heads/master/streams/vn.m3u"
        ]

        channels = OrderedDict() 
        id_to_name_map = {}      
        name_to_id_map = {}      
        vnepg_id_to_logo = {}    

        # Tối ưu: Compile trước Regex để tăng tốc độ xử lý chuỗi
        RE_CLEAN_NAME = re.compile(r'\s*[\(\[][^\]\)]*[\)\]]')
        RE_NON_ALPHANUM = re.compile(r'[^a-z0-9]')
        RE_TVG_ID = re.compile(r'tvg-id="([^"]*)"')
        RE_GROUP = re.compile(r'group-title="([^"]*)"')
        RE_LOGO = re.compile(r'tvg-logo="([^"]*)"')

        def clean_tvg_id(raw_id):
            if not raw_id: return ""
            ch_id = raw_id.lower().replace(".vn", "").replace("@hd", "").replace("@sd", "").replace("@qhd", "")
            return RE_NON_ALPHANUM.sub('', ch_id).strip()

        def clean_channel_name(raw_name):
            if not raw_name: return ""
            name = RE_CLEAN_NAME.sub('', raw_name.lower())
            return RE_NON_ALPHANUM.sub('', name).strip()

        # TỐI ƯU HÀM CHECK LIVE: GIẢ LẬP TIVIMATE / TELEVIZO & TĂNG TỐC FFPROBE
        def check_stream_live(stream_url):
            # TiviMate và Televizo chạy trên nền Android đều sử dụng nhân phát ExoPlayer Lib
            user_agent = "Televizo/1.9.7.1 (Linux;Android 11) ExoPlayerLib/2.14.2"
            
            cmd = [
                'ffprobe', 
                '-v', 'quiet',                     # Tối ưu: Tắt sạch log thừa của ffmpeg để giải phóng CPU
                '-nobanner', 
                '-user_agent', user_agent,         # Giả lập hoàn hảo app IPTV Android
                '-show_entries', 'format=format_name', 
                '-of', 'default=noprint_wrappers=1', 
                '-probesize', '32',                # Tối ưu: Chỉ đọc 32 bytes đầu (đủ nhận diện header luồng phát)
                '-analyzeduration', '0',           # Tối ưu: Bỏ qua bước phân tích sâu bitrate, codec để check cực nhanh
                '-timeout', '8000000',             # Chờ kết nối 8 giây (phù hợp mạng quốc tế)
                '-rw_timeout', '8000000',          # Chờ đọc gói tin 8 giây
                stream_url
            ]
            try:
                result = subprocess.run(cmd, stdout=subprocess.PIPE, stderr=subprocess.PIPE, timeout=10)
                return result.returncode == 0
            except Exception:
                return False

        # 1. ĐỌC FILE TẠM VNEPG
        if os.path.exists("vnepg_raw.json"):
            try:
                with open("vnepg_raw.json", "r", encoding="utf-8") as f:
                    raw_data = json.load(f)
                    for ch in raw_data.get("channels", []):
                        ch_id = str(ch.get("id", "")).strip()
                        ch_name = str(ch.get("name", "")).strip()
                        ch_logo = str(ch.get("logo", "")).strip()
                        if ch_id and ch_name:
                            channels[ch_name] = {"tvg-id": ch_id, "group-title": "Truyền Hình", "tvg-logo": ch_logo, "urls": []}
                            vnepg_id_to_logo[ch_id] = ch_logo
                            id_to_name_map[clean_tvg_id(ch_id)] = ch_name
                            name_to_id_map[clean_channel_name(ch_name)] = ch_id
            except Exception:
                pass

        def parse_attributes(line):
            tvg_id = group_title = tvg_logo = ""
            id_match = RE_TVG_ID.search(line)
            group_match = RE_GROUP.search(line)
            logo_match = RE_LOGO.search(line)
            
            if id_match: tvg_id = id_match.group(1).strip()
            if group_match: group_title = group_match.group(1).strip()
            if logo_match: tvg_logo = logo_match.group(1).strip()
            
            raw_name = line.rsplit(",", 1)[1].strip() if "," in line else ""
            clean_name = RE_CLEAN_NAME.sub('', raw_name)
            return tvg_id, group_title, tvg_logo, " ".join(clean_name.split()).strip()

        # 2. ĐỒNG BỘ LUỒNG TỪ CÁC LINK RAW
        used_urls = set()
        collected_streams = [] 
        import urllib.request

        for url in urls:
            print(f"Đang phân tích danh sách từ nguồn: {url}")
            req = urllib.request.Request(url, headers={"User-Agent": "Mozilla/5.0"})
            try:
                with urllib.request.urlopen(req) as response:
                    content = response.read().decode("utf-8-sig")
            except Exception:
                continue

            lines = content.splitlines()
            last_key = None

            for line in lines:
                line_str = line.strip()
                if not line_str or line_str.startswith("#EXTM3U") or line_str.startswith("#PLAYLISTINF"): continue
                
                if line_str.startswith("#EXTINF"):
                    tvg_id, group_title, tvg_logo, clean_name = parse_attributes(line_str)
                    raw_norm_id = clean_tvg_id(tvg_id)
                    raw_norm_name = clean_channel_name(clean_name)
                    
                    matched_standard_name = None
                    if raw_norm_id in id_to_name_map:
                        matched_standard_name = id_to_name_map[raw_norm_id]
                    elif raw_norm_name in name_to_id_map:
                        matched_standard_name = id_to_name_map.get(clean_tvg_id(name_to_id_map[raw_norm_name]))

                    if matched_standard_name:
                        key = matched_standard_name
                        if group_title and group_title != "Truyền Hình": channels[key]["group-title"] = group_title
                    else:
                        key = clean_name if clean_name else (tvg_id if tvg_id else "Kênh Phụ")
                        if key not in channels:
                            channels[key] = {"tvg-id": tvg_id, "group-title": group_title if group_title else "Kênh Phụ", "tvg-logo": tvg_logo, "urls": []}
                    last_key = key
                    
                elif line_str.startswith("http://") or line_str.startswith("https://"):
                    if last_key and line_str not in used_urls:
                        collected_streams.append((last_key, line_str))
                        used_urls.add(line_str)

        # CHẠY ĐA LUỒNG TỐI ƯU (Độ mượt cao, không làm nghẽn card mạng máy ảo)
        print(f"Bắt đầu kiểm tra {len(collected_streams)} luồng phát trực tuyến...")
        
        def process_single_stream(item):
            key, stream_url = item
            if check_stream_live(stream_url):
                return key, stream_url, True
            return key, stream_url, False

        live_count = 0
        with ThreadPoolExecutor(max_workers=8) as executor:
            results = executor.map(process_single_stream, collected_streams)
            for key, stream_url, is_live in results:
                if is_live:
                    channels[key]["urls"].append(stream_url)
                    live_count += 1

        print(f" Hoàn tất kiểm tra! Giữ lại {live_count} luồng đang hoạt động ổn định.")

        # 3. XUẤT FILE M3U
        output_lines = ["#EXTM3U url-tvg=\"https://vnepg.site/epg.xml\""]

        for name, info in channels.items():
            urls_list = info["urls"]
            if not urls_list: continue 
            
            final_logo = info["tvg-logo"]
            current_id = info["tvg-id"]
            if current_id in vnepg_id_to_logo:
                final_logo = vnepg_id_to_logo[current_id]
            
            attrs = []
            if current_id: attrs.append(f'tvg-id="{current_id}"')
            if info["group-title"]: attrs.append(f'group-title="{info["group-title"]}"')
            if final_logo: attrs.append(f'tvg-logo="{final_logo}"')
            attr_str = " " + " ".join(attrs)
            
            output_lines.append(f"#EXTINF:-1{attr_str},{name}")
            output_lines.append(urls_list[0])
            
            for i, url_bak in enumerate(urls_list[1:], start=1):
                output_lines.append(f"#EXTINF:-1{attr_str},{name} [Dự phòng {i}]")
                output_lines.append(url_bak)

        with open("listtivi.m3u", "w", encoding="utf-8") as f:
            f.write("\n".join(output_lines) + "\n")
        print(" Xuất danh sách M3U siêu chuẩn thành công!")
        EOF
        python3 optimize_m3u.py

    - name: Commit and Push changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add "listtivi.m3u"
        if git diff --staged --quiet; then
          echo "Không phát hiện thay đổi."
        else
          git commit -m "Auto-update & Giả lập player IPTV tối ưu tốc độ check"
          git push
        fi
