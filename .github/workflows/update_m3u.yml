name: Auto Update M3U Daily

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-list:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5

    - name: Clean, Optimize and Build M3U
      run: |
        cat << 'EOF' > optimize_m3u.py
        import re, json, urllib.request
        from collections import OrderedDict

        # ====================================================================
        # 1. Cáș€U HĂNH CÆ  BáșąN (Dá» DĂNG CHá»NH Sá»ŹA & BáșąO TRĂ)
        # ====================================================================
        M3U_SOURCES = [
            "https://raw.githubusercontent.com/DinhLap96/ListTivi/refs/heads/main/ListTiVi/dltivi_v2.ndl",
            "https://raw.githubusercontent.com/iptv-org/iptv/refs/heads/master/streams/vn.m3u"
        ]

        GROUP_ORDER = ["VTV", "HTV", "THVL", "SCTV", "KĂȘnh Äáș·c Biá»t", "Äá»a PhÆ°ÆĄng", "Radio"]

        # ====================================================================
        # 2. Tá»Ș ÄIá»N CHUáșšN HĂA TĂN KĂNH (MAPPING TABLE)
        # ====================================================================
        CHANNEL_MAPPING = {
            "VTV1": ["vtv1", "vtv1hd"], "VTV2": ["vtv2", "vtv2hd"], "VTV3": ["vtv3", "vtv3hd"],
            "VTV4": ["vtv4", "vtv4hd"], "VTV5": ["vtv5", "vtv5hd"], "VTV6": ["vtv6", "vtv6hd"],
            "VTV7": ["vtv7", "vtv7hd"], "VTV8": ["vtv8", "vtv8hd"], "VTV9": ["vtv9", "vtv9hd"],
            "VTV10": ["vtv10", "vtv10hd", "vtvcantho", "vtv can tho", "vtv cáș§n thÆĄ"],
            "VTV5 TĂąy Nam Bá»": ["vtv5 tĂąy nam bá»", "vtv5tnb"],
            "VTV5 TĂąy NguyĂȘn": ["vtv5 tĂąy nguyĂȘn", "vtv5tn"],
            "HTV1": ["htv1"], "HTV2 - Vie Channel": ["htv2", "vie channel"], "HTV3": ["htv3"], 
            "HTV4": ["htv4"], "HTV7": ["htv7", "htv7hd"], "HTV9": ["htv9", "htv9hd"],
            "THVL1": ["thvl1", "vÄ©nh long 1", "vinh long 1"], 
            "THVL2": ["thvl2", "vÄ©nh long 2", "vinh long 2"],
            "THVL3": ["thvl3", "vÄ©nh long 3", "vinh long 3"], 
            "THVL4": ["thvl4", "vÄ©nh long 4", "vinh long 4"],
            "ANTV": ["antv", "an ninh tv"], "QPVN": ["qpvn", "quá»c phĂČng viá»t nam"]
        }

        # ====================================================================
        # 3. STATIC LOGOS (FALLBACK) - LINK á»N Äá»NH Tá»Ș WIKIMEDIA
        # ====================================================================
        STATIC_CHANNEL_LOGOS = {
            "VTV1": "https://upload.wikimedia.org/wikipedia/commons/thumb/c/c5/VTV1_logo_2013.svg/512px-VTV1_logo_2013.svg.png",
            "VTV2": "https://upload.wikimedia.org/wikipedia/commons/thumb/1/1a/VTV2_logo_2013.svg/512px-VTV2_logo_2013.svg.png",
            "VTV3": "https://upload.wikimedia.org/wikipedia/commons/thumb/8/87/VTV3_logo_2013.svg/512px-VTV3_logo_2013.svg.png",
            "VTV4": "https://upload.wikimedia.org/wikipedia/commons/thumb/6/60/VTV4_logo_2013.svg/512px-VTV4_logo_2013.svg.png",
            "VTV5": "https://upload.wikimedia.org/wikipedia/commons/thumb/4/4b/VTV5_logo_2013.svg/512px-VTV5_logo_2013.svg.png",
            "VTV6": "https://upload.wikimedia.org/wikipedia/commons/thumb/7/7b/VTV6_logo_2013.svg/512px-VTV6_logo_2013.svg.png",
            "VTV7": "https://upload.wikimedia.org/wikipedia/commons/thumb/a/a2/VTV7_logo_2015.svg/512px-VTV7_logo_2015.svg.png",
            "VTV8": "https://upload.wikimedia.org/wikipedia/commons/thumb/6/65/VTV8_logo_2016.svg/512px-VTV8_logo_2016.svg.png",
            "VTV9": "https://upload.wikimedia.org/wikipedia/commons/thumb/9/91/VTV9_logo_2013.svg/512px-VTV9_logo_2013.svg.png",
            "HTV7": "https://upload.wikimedia.org/wikipedia/commons/thumb/8/8d/HTV7_2016.svg/512px-HTV7_2016.svg.png",
            "HTV9": "https://upload.wikimedia.org/wikipedia/commons/thumb/8/8a/HTV9_2016.svg/512px-HTV9_2016.svg.png",
            "THVL1": "https://upload.wikimedia.org/wikipedia/commons/thumb/7/7b/Logo_THVL1.svg/512px-Logo_THVL1.svg.png",
            "THVL2": "https://upload.wikimedia.org/wikipedia/commons/thumb/b/b5/Logo_THVL2.svg/512px-Logo_THVL2.svg.png",
            "ANTV": "https://upload.wikimedia.org/wikipedia/commons/4/4d/Logo_ANTV.png",
            "QPVN": "https://upload.wikimedia.org/wikipedia/commons/c/cd/QPVN_logo.png"
        }

        STATIC_GROUP_LOGOS = {
            "VTV": "https://upload.wikimedia.org/wikipedia/commons/thumb/1/18/Vietnam_Television_logo_2013.svg/512px-Vietnam_Television_logo_2013.svg.png",
            "HTV": "https://upload.wikimedia.org/wikipedia/commons/thumb/c/cd/HTV_logo_2016.svg/512px-HTV_logo_2016.svg.png",
            "THVL": "https://upload.wikimedia.org/wikipedia/commons/thumb/7/7b/Logo_THVL1.svg/512px-Logo_THVL1.svg.png",
            "SCTV": "https://upload.wikimedia.org/wikipedia/commons/thumb/2/23/SCTV_logo.png/512px-SCTV_logo.png",
            "KĂȘnh Äáș·c Biá»t": "https://upload.wikimedia.org/wikipedia/commons/thumb/2/29/Gold_Star.svg/512px-Gold_Star.svg.png",
            "Äá»a PhÆ°ÆĄng": "https://upload.wikimedia.org/wikipedia/commons/thumb/3/3a/Location_map_pin.svg/512px-Location_map_pin.svg.png",
            "Radio": "https://upload.wikimedia.org/wikipedia/commons/thumb/f/f6/Radio_icon.svg/512px-Radio_icon.svg.png"
        }

        # ====================================================================
        # 4. HĂM TIá»N ĂCH (HELPER FUNCTIONS)
        # ====================================================================
        def remove_accents(s):
            s = s.lower()
            s = re.sub(r'[Ă ĂĄáșĄáșŁĂŁĂąáș§áș„áș­áș©áș«Äáș±áșŻáș·áșłáș”]', 'a', s)
            s = re.sub(r'[ĂšĂ©áșčáș»áșœĂȘá»áșżá»á»á»]', 'e', s)
            s = re.sub(r'[ĂŹĂ­á»á»Ä©]', 'i', s)
            s = re.sub(r'[ĂČĂłá»á»Ă”ĂŽá»á»á»á»á»ÆĄá»á»á»Łá»á»Ą]', 'o', s)
            s = re.sub(r'[ĂčĂșá»„á»§Ć©Æ°á»«á»©á»±á»­á»Ż]', 'u', s)
            s = re.sub(r'[á»łĂœá»”á»·á»č]', 'y', s)
            s = re.sub(r'[Ä]', 'd', s)
            return s.strip()

        def get_canonical_name(raw_name):
            clean = re.sub(r'\(.*?\)|\[.*?\]', '', raw_name)
            clean = re.sub(r'\b(hd|sd|4k|1080p|720p|fhd)\b', '', clean, flags=re.IGNORECASE)
            clean = " ".join(clean.split()).strip()
            
            clean_no_mark = remove_accents(clean)
            for canonical, variants in CHANNEL_MAPPING.items():
                variants_no_mark = [remove_accents(v) for v in variants]
                if clean_no_mark == remove_accents(canonical) or clean_no_mark in variants_no_mark:
                    return canonical
            return clean

        def determine_group(name):
            name_lower = remove_accents(name)
            if any(x in name_lower for x in ["vtv", "vietnam today"]): return "VTV"
            if "htv" in name_lower: return "HTV"
            if any(x in name_lower for x in ["thvl", "vinh long"]): return "THVL"
            if "sctv" in name_lower: return "SCTV"
            if any(x in name_lower for x in ["antv", "an ninh", "qpvn", "quoc phong", "quoc hoi"]): return "KĂȘnh Äáș·c Biá»t"
            if any(x in name_lower for x in ["radio", "fm", "am", "vov"]): return "Radio"
            return "Äá»a PhÆ°ÆĄng"

        # ====================================================================
        # 5. Xá»Ź LĂ API LOGO Tá»Ș IPTV-ORG (PRIMARY TIER)
        # ====================================================================
        def fetch_primary_logos():
            logos = {}
            try:
                # Äá»c ná»i dung json trá»±c tiáșżp tá»« API
                req = urllib.request.Request("https://iptv-org.github.io/api/logos.json", headers={"User-Agent": "Mozilla/5.0"})
                content = urllib.request.urlopen(req, timeout=15).read().decode("utf-8")
                data = json.loads(content)
                
                # TáșĄo báșŁng mapping phĂč há»Łp tá»« dá»Ż liá»u JSON
                if isinstance(data, list):
                    for item in data:
                        logo_url = item.get("logo") or item.get("url")
                        name = item.get("name") or item.get("id") or item.get("channel")
                        
                        if logo_url and name:
                            logos[remove_accents(str(name))] = logo_url
            except Exception as e:
                print(f"Lá»i náșĄp API logo iptv-org: {e}")
            return logos

        # ====================================================================
        # 6. LOGIC CHĂNH: Xá»Ź LĂ M3U & Táș O FILE Má»I
        # ====================================================================
        def main():
            print("Fetching Primary Logos...")
            primary_logos = fetch_primary_logos()
            channels_data = {}
            
            print("Parsing M3U Sources...")
            for url in M3U_SOURCES:
                try:
                    req = urllib.request.Request(url, headers={"User-Agent": "Mozilla/5.0"})
                    content = urllib.request.urlopen(req, timeout=15).read().decode("utf-8-sig")
                    lines = content.splitlines()
                    
                    current_extinf = ""
                    current_raw_name = ""
                    
                    for line in lines:
                        line = line.strip()
                        if not line: continue
                        
                        if line.lower().startswith("#extinf:"):
                            current_extinf = line
                            match = re.search(r',([^,]*)$', line)
                            current_raw_name = match.group(1).strip() if match else line.split(',')[-1].strip()
                            continue
                        
                        if line.startswith("http") and current_extinf and current_raw_name:
                            name = get_canonical_name(current_raw_name)
                            group = determine_group(name)
                            
                            # LOGIC CHá»N LOGO Má»I (ÆŻU TIĂN RĂ RĂNG)
                            primary_logo = primary_logos.get(remove_accents(name), "")
                            fallback_logo = STATIC_CHANNEL_LOGOS.get(name, "")
                            
                            raw_logo = ""
                            raw_match = re.search(r'tvg-logo="([^"]*)"', current_extinf, re.IGNORECASE)
                            if raw_match: raw_logo = raw_match.group(1).strip()
                            
                            # ÄÆ°a logo JSON lĂ m Primary, fallback báș±ng Static, cuá»i cĂčng lĂ  Raw
                            final_logo = primary_logo or fallback_logo or raw_logo
                            
                            if name not in channels_data:
                                channels_data[name] = {
                                    "group": group,
                                    "logo": final_logo,
                                    "urls": [line]
                                }
                            else:
                                if line not in channels_data[name]["urls"]:
                                    channels_data[name]["urls"].append(line)
                                
                                # Cáș­p nháș­t logo náșżu trÆ°á»c ÄĂł chÆ°a tĂŹm tháș„y
                                if not channels_data[name]["logo"] and final_logo:
                                    channels_data[name]["logo"] = final_logo
                                    
                            current_extinf = ""
                            current_raw_name = ""
                            
                except Exception as e:
                    print(f"Lá»i khi xá»­ lĂœ {url}: {e}")

            print("Exporting to listtivi.m3u...")
            final_ordered = OrderedDict()
            for g in GROUP_ORDER:
                sorted_channels = sorted(
                    [k for k, v in channels_data.items() if v["group"] == g],
                    key=lambda s: [int(t) if t.isdigit() else t.lower() for t in re.split(r'(\d+)', remove_accents(s))]
                )
                for ch in sorted_channels:
                    final_ordered[ch] = channels_data[ch]

            with open("listtivi.m3u", "w", encoding="utf-8") as f:
                f.write('#EXTM3U url-tvg="https://vnepg.site/epg.xml.gz"\n')
                for name, data in final_ordered.items():
                    if not data["urls"]: continue
                    
                    logo_attr = f' tvg-logo="{data["logo"]}"' if data["logo"] else ""
                    
                    group_logo_url = STATIC_GROUP_LOGOS.get(data["group"], "")
                    group_logo_attr = f' group-logo="{group_logo_url}"' if group_logo_url else ""
                    
                    for idx, url in enumerate(data["urls"]):
                        suffix = f" [Dá»± phĂČng {idx+1}]" if idx > 0 else ""
                        extinf = f'#EXTINF:-1{logo_attr}{group_logo_attr} group-title="{data["group"]}",{name}{suffix}'
                        f.write(f'{extinf}\n{url}\n')
                        
            print("Build Success!")

        if __name__ == "__main__":
            main()
        EOF
        python3 optimize_m3u.py
        
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add "listtivi.m3u"
        git commit -m "Refactor: Modular code, prioritize iptv-org logos API, robust static fallbacks" || echo "No changes"
        git push
