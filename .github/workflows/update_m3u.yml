name: Auto Update M3U Daily

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-list:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5

    - name: Clean, Optimize and Build M3U
      run: |
        cat << 'EOF' > optimize_m3u.py
        import re, json, os, urllib.request, urllib.error
        from collections import OrderedDict

        # ====================================================================
        # 1. CAU HINH CO BAN
        # ====================================================================
        M3U_SOURCES = [
            "https://raw.githubusercontent.com/DinhLap96/ListTivi/refs/heads/main/ListTiVi/dltivi_v2.ndl",
            "https://raw.githubusercontent.com/iptv-org/iptv/refs/heads/master/streams/vn.m3u"
        ]

        GROUP_ORDER = ["VTV", "ON", "HTV", "HTVC", "SCTV", "THVL", "Kenh Dac Biet",
                       "Phim & Giai Tri Quoc Te", "Dia Phuong", "VOV-VOH", "Radio"]

        # vnepg_backup.json: da co san trong repo chinh cua ban (nhanh main).
        # LY DO ton tai: vnepg.site chan IP ngoai Viet Nam bang Cloudflare firewall
        # nen GitHub Actions khong tu fetch truc tiep duoc. Ban tu fetch tren mang VN
        # roi commit de cap nhat file nay. Dung lam FALLBACK CUOI CUNG cho logo,
        # nhung van dung de chuan hoa TEN/NHOM kenh (Д‘ГЎng tin cбє­y nhбєҐt cho viб»‡c nГ y).
        VNEPG_BACKUP_FILE = "vnepg_backup.json"

        IPTV_ORG_CHANNELS_API = "https://iptv-org.github.io/api/channels.json"
        IPTV_ORG_LOGOS_API = "https://iptv-org.github.io/api/logos.json"

        # Domain duoc tin tuong tuyet doi, KHONG validate qua HTTP (do bi Cloudflare
        # chan IP datacenter/GitHub Actions nen HEAD request se bao loi gia du link
        # van dung binh thuong voi nguoi dung that; hoac da duoc pin version on dinh).
        TRUSTED_DOMAINS = ("vnepg.site", "cdn.jsdelivr.net")

        # Vai goi y id thu cong cho truong hop ten kenh dac biet ma khong khop duoc
        # qua channels.json (safety net, uu tien thap hon channels.json match).
        IPTV_ORG_ID_HINTS = {
            "ANTV": "AnNinhTV.vn", "QPVN": "QPVN.vn", "Vietnam Today": "VietnamToday.vn",
            "HTV Key": "HTVKey.vn", "HTV Thб»ѓ thao": "HTVSports.vn",
        }

        # Vai id tvg-id trong nguon raw khong khop truc tiep voi vnepg_backup.json,
        # can quy doi thu cong (chi anh huong TEN/NHOM, khong anh huong logo).
        ID_ALIASES = {"vntoday": "vietnamtoday"}

        # ====================================================================
        # 2. TU DIEN CHUAN HOA TEN KENH (fallback khi khong khop tvg-id/ten voi
        #    vnepg_backup.json)
        # ====================================================================
        CHANNEL_MAPPING = {
            "VTV1": ["vtv1", "vtv1hd"], "VTV2": ["vtv2", "vtv2hd"], "VTV3": ["vtv3", "vtv3hd"],
            "VTV4": ["vtv4", "vtv4hd"], "VTV5": ["vtv5", "vtv5hd"], "VTV6": ["vtv6", "vtv6hd"],
            "VTV7": ["vtv7", "vtv7hd"], "VTV8": ["vtv8", "vtv8hd"], "VTV9": ["vtv9", "vtv9hd"],
            "VTV10": ["vtv10", "vtv10hd", "vtvcantho", "vtv can tho"],
            "VTV5 Tay Nam Bo": ["vtv5 tay nam bo", "vtv5tnb"],
            "VTV5 Tay Nguyen": ["vtv5 tay nguyen", "vtv5tn"],
            "HTV1": ["htv1"], "HTV2 - Vie Channel": ["htv2", "vie channel"], "HTV3": ["htv3"],
            "HTV4": ["htv4"], "HTV7": ["htv7", "htv7hd"], "HTV9": ["htv9", "htv9hd"],
            "THVL1": ["thvl1", "vinh long 1"], "THVL2": ["thvl2", "vinh long 2"],
            "THVL3": ["thvl3", "vinh long 3"], "THVL4": ["thvl4", "vinh long 4"],
            "ANTV": ["antv", "an ninh tv"], "QPVN": ["qpvn", "quoc phong viet nam"],
        }

        # ====================================================================
        # 3. HAM TIEN ICH
        # ====================================================================
        def remove_accents(s):
            s = s.lower()
            s = re.sub(r'[aГ ГЎбєЎбєЈГЈГўбє§бєҐбє­бє©бє«Дѓбє±бєЇбє·бєібєµ]', 'a', s)
            s = re.sub(r'[eГЁГ©бє№бє»бєЅГЄб»Ѓбєїб»‡б»ѓб»…]', 'e', s)
            s = re.sub(r'[iГ¬Г­б»‹б»‰Д©]', 'i', s)
            s = re.sub(r'[oГІГіб»Ќб»ЏГµГґб»“б»‘б»™б»•б»—ЖЎб»ќб»›б»Јб»џб»Ў]', 'o', s)
            s = re.sub(r'[uГ№Гєб»Ґб»§Е©Ж°б»«б»©б»±б»­б»Ї]', 'u', s)
            s = re.sub(r'[yб»іГЅб»µб»·б»№]', 'y', s)
            s = re.sub(r'[Д‘]', 'd', s)
            return re.sub(r'\s+', ' ', s).strip()

        def get_tvg_id(extinf_line):
            m = re.search(r'tvg-id="([^"]*)"', extinf_line, re.IGNORECASE)
            return m.group(1).strip().lower() if m else ""

        def get_canonical_name(raw_name, tvg_id, vnepg_id_map, vnepg_name_map):
            tvg_id = ID_ALIASES.get(tvg_id, tvg_id)
            # Uu tien 1: khop chinh xac theo tvg-id voi vnepg_backup.json
            if tvg_id and tvg_id in vnepg_id_map:
                return vnepg_id_map[tvg_id]["name"]

            clean = re.sub(r'\(.*?\)|\[.*?\]', '', raw_name)
            clean = re.sub(r'\b(hd|sd|4k|1080p|720p|fhd)\b', '', clean, flags=re.IGNORECASE)
            clean = " ".join(clean.split()).strip()
            clean_no_mark = remove_accents(clean)

            # Uu tien 2: khop theo ten (khong dau, khong phan biet hoa/thuong) voi
            # vnepg_backup.json -> gom duoc cac bien the viet hoa/thuong khac nhau
            # (vd "VietNam Today" va "Vietnam Today" ve chung 1 ten)
            if clean_no_mark in vnepg_name_map:
                return vnepg_name_map[clean_no_mark]["name"]

            # Uu tien 3: bang chuan hoa thu cong
            for canonical, variants in CHANNEL_MAPPING.items():
                variants_no_mark = [remove_accents(v) for v in variants]
                if clean_no_mark == remove_accents(canonical) or clean_no_mark in variants_no_mark:
                    return canonical

            return clean

        def determine_group(name, tvg_id, vnepg_id_map):
            tvg_id = ID_ALIASES.get(tvg_id, tvg_id)
            if tvg_id and tvg_id in vnepg_id_map:
                gid = tvg_id
                if gid.startswith("on"): return "ON"
                if gid.startswith("vtv") or gid == "vietnamtoday": return "VTV"
                if gid.startswith("htvc"): return "HTVC"
                if gid.startswith("htv"): return "HTV"
                if gid.startswith("sctv"): return "SCTV"
                if gid.startswith("vinhlong") or gid.startswith("thvl"): return "THVL"
                if gid in ("antvhd", "qpvnhd"): return "Kenh Dac Biet"
                if gid.startswith("vov") or gid.startswith("voh"): return "VOV-VOH"
                if "radio" in gid: return "Radio"

            name_lower = remove_accents(name)
            if any(x in name_lower for x in ["vtv", "vietnam today"]): return "VTV"
            if "htvc" in name_lower: return "HTVC"
            if "htv" in name_lower: return "HTV"
            if any(x in name_lower for x in ["thvl", "vinh long"]): return "THVL"
            if "sctv" in name_lower: return "SCTV"
            if any(x in name_lower for x in ["antv", "an ninh", "qpvn", "quoc phong", "quoc hoi"]): return "Kenh Dac Biet"
            if any(x in name_lower for x in ["radio", "fm ", "am ", "vov", "voh"]): return "Radio"
            if any(x in name_lower for x in ["hbo", "cinemax", "cartoon", "discovery", "bbc", "cnn",
                                              "cnbc", "history", "animal planet", "fashiontv", "axn",
                                              "warner", "box movie", "hollywood", "kbs", "arirang",
                                              "nhk", "dw", "france 24", "tv5monde", "bloomberg"]):
                return "Phim & Giai Tri Quoc Te"
            return "Dia Phuong"

        # ====================================================================
        # 4. NAP VNEPG_BACKUP.JSON (dung de chuan hoa ten/nhom + fallback logo cuoi)
        # ====================================================================
        def load_vnepg_backup():
            id_map, name_map = {}, {}
            if not os.path.exists(VNEPG_BACKUP_FILE):
                print(f"Khong tim thay {VNEPG_BACKUP_FILE}, bo qua.")
                return id_map, name_map
            try:
                with open(VNEPG_BACKUP_FILE, "r", encoding="utf-8") as f:
                    data = json.load(f)
                for ch in data.get("channels", []):
                    cid = str(ch.get("id", "")).strip().lower()
                    name = str(ch.get("name", "")).strip()
                    logo = str(ch.get("logo", "")).strip()
                    if not name:
                        continue
                    entry = {"name": name, "logo": logo}
                    if cid:
                        id_map[cid] = entry
                    name_map[remove_accents(name)] = entry
                print(f"Da nap {len(id_map)} kenh tu vnepg_backup.json.")
            except Exception as e:
                print(f"Loi doc {VNEPG_BACKUP_FILE}: {e}")
            return id_map, name_map

        # ====================================================================
        # 5. NAP DU LIEU IPTV-ORG (channels.json + logos.json) - TANG UU TIEN 1
        # ====================================================================
        def http_get_json(url, timeout=20):
            req = urllib.request.Request(url, headers={"User-Agent": "Mozilla/5.0"})
            content = urllib.request.urlopen(req, timeout=timeout).read().decode("utf-8")
            return json.loads(content)

        def load_iptvorg_data():
            name_to_id = {}
            id_to_logo = {}
            try:
                channels = http_get_json(IPTV_ORG_CHANNELS_API, timeout=30)
                for ch in channels:
                    cid = ch.get("id")
                    if not cid:
                        continue
                    names = [ch.get("name", "")] + list(ch.get("alt_names") or [])
                    for n in names:
                        n = remove_accents(str(n))
                        if n and n not in name_to_id:
                            name_to_id[n] = cid
                print(f"Da nap {len(channels)} kenh tu channels.json cua iptv-org.")
            except Exception as e:
                print(f"Loi nap channels.json: {e}")

            try:
                logos = http_get_json(IPTV_ORG_LOGOS_API, timeout=30)
                for item in logos:
                    cid = item.get("channel")
                    url = item.get("url")
                    if cid and url and cid not in id_to_logo:
                        id_to_logo[cid] = url
                print(f"Da nap {len(id_to_logo)} logo tu logos.json cua iptv-org.")
            except Exception as e:
                print(f"Loi nap logos.json: {e}")

            return name_to_id, id_to_logo

        # ====================================================================
        # 6. VALIDATE URL (LOAI BO LINK CHET/HALLUCINATED, VD WIKIMEDIA GIA)
        #    Cache theo URL de khong goi lai nhieu lan cho cung 1 link.
        # ====================================================================
        _validate_cache = {}

        def validate_url(url, timeout=4):
            if not url:
                return False
            if url in _validate_cache:
                return _validate_cache[url]
            if any(d in url for d in TRUSTED_DOMAINS):
                _validate_cache[url] = True
                return True
            ok = False
            try:
                req = urllib.request.Request(url, method="HEAD", headers={"User-Agent": "Mozilla/5.0"})
                with urllib.request.urlopen(req, timeout=timeout) as resp:
                    ok = 200 <= resp.status < 400
            except Exception:
                try:
                    req = urllib.request.Request(url, headers={"User-Agent": "Mozilla/5.0", "Range": "bytes=0-1024"})
                    with urllib.request.urlopen(req, timeout=timeout) as resp:
                        ok = 200 <= resp.status < 400
                except Exception:
                    ok = False
            _validate_cache[url] = ok
            return ok

        # ====================================================================
        # 7. CHON LOGO KENH: TANG 1 iptv-org -> TANG 2 raw nguon -> TANG 3 vnepg_backup
        # ====================================================================
        def pick_logo(canonical_name, tvg_id, vnepg_id_map, vnepg_name_map,
                      iptvorg_name_to_id, iptvorg_id_to_logo, raw_logo):
            tvg_id = ID_ALIASES.get(tvg_id, tvg_id)

            # --- TANG 1: iptv-org ---
            candidates = []
            # a) tvg-id kieu "VTV1.vn@HD" (tu chinh nguon iptv-org) -> bo "@..."
            if tvg_id and "@" in tvg_id:
                base_id = tvg_id.split("@")[0]
                # tvg-id trong file duoc .lower(), can khop hoa/thuong that su
                for cid in iptvorg_id_to_logo:
                    if cid.lower() == base_id:
                        candidates.append(iptvorg_id_to_logo[cid])
                        break
            # b) khop theo ten (channels.json) Д‘ГЈ chuбє©n hoГЎ
            cid = iptvorg_name_to_id.get(remove_accents(canonical_name))
            if cid and cid in iptvorg_id_to_logo:
                candidates.append(iptvorg_id_to_logo[cid])
            # c) goi y thu cong
            hinted_id = IPTV_ORG_ID_HINTS.get(canonical_name)
            if hinted_id and hinted_id in iptvorg_id_to_logo:
                candidates.append(iptvorg_id_to_logo[hinted_id])
            # d) doan id ".vn"
            guess_id = re.sub(r'[^A-Za-z0-9]', '', canonical_name) + ".vn"
            if guess_id in iptvorg_id_to_logo:
                candidates.append(iptvorg_id_to_logo[guess_id])

            for c in candidates:
                if validate_url(c):
                    return c

            # --- TANG 2: logo goc tu 2 nguon raw (.ndl / .m3u) ---
            if raw_logo and validate_url(raw_logo):
                return raw_logo

            # --- TANG 3: vnepg_backup.json (fallback cuoi cung) ---
            if tvg_id and tvg_id in vnepg_id_map and vnepg_id_map[tvg_id]["logo"]:
                return vnepg_id_map[tvg_id]["logo"]
            key = remove_accents(canonical_name)
            if key in vnepg_name_map and vnepg_name_map[key]["logo"]:
                return vnepg_name_map[key]["logo"]

            return ""

        # ====================================================================
        # 8. GROUP-LOGO: LOGO THAT CUA DAI (lay tu vnepg_backup.json, tin cay,
        #    khong dung hinh minh hoa). Nhom "Dia Phuong"/"Radio" khong co 1
        #    thuong hieu chung nen dung icon trung tinh (khong co logo dai nao
        #    dai dien duoc cho hang chuc dai dia phuong khac nhau).
        # ====================================================================
        GROUP_LOGO_SOURCE_ID = {
            "VTV": "vtv1hd", "ON": "onsports", "HTV": "htv7hd", "HTVC": "htvcphimhd",
            "SCTV": "sctv1hd", "THVL": "vinhlong1hd", "Kenh Dac Biet": "antvhd",
            "Phim & Giai Tri Quoc Te": "hbohd", "VOV-VOH": "vov1",
        }
        GENERIC_ICONS = {
            "Dia Phuong": "https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/72x72/1f4cd.png",
            "Radio": "https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/72x72/1f4fb.png",
        }

        def build_group_logos(vnepg_id_map):
            group_logos = {}
            for group, src_id in GROUP_LOGO_SOURCE_ID.items():
                entry = vnepg_id_map.get(src_id)
                if entry and entry["logo"]:
                    group_logos[group] = entry["logo"]
            group_logos.update(GENERIC_ICONS)
            return group_logos

        # ====================================================================
        # 9. LOGIC CHINH
        # ====================================================================
        def main():
            print("Nap vnepg_backup.json...")
            vnepg_id_map, vnepg_name_map = load_vnepg_backup()

            print("Nap du lieu iptv-org (channels.json + logos.json)...")
            iptvorg_name_to_id, iptvorg_id_to_logo = load_iptvorg_data()

            static_group_logos = build_group_logos(vnepg_id_map)

            channels_data = {}  # key = ten da chuan hoa khong dau (dedup key)

            print("Phan tich cac nguon M3U...")
            for url in M3U_SOURCES:
                try:
                    req = urllib.request.Request(url, headers={"User-Agent": "Mozilla/5.0"})
                    content = urllib.request.urlopen(req, timeout=15).read().decode("utf-8-sig")
                    lines = content.splitlines()

                    current_extinf = ""
                    current_raw_name = ""

                    for line in lines:
                        line = line.strip()
                        if not line:
                            continue

                        if line.lower().startswith("#extinf:"):
                            current_extinf = line
                            match = re.search(r',([^,]*)$', line)
                            current_raw_name = match.group(1).strip() if match else line.split(',')[-1].strip()
                            continue

                        if line.startswith("http") and current_extinf and current_raw_name:
                            tvg_id = get_tvg_id(current_extinf)
                            display_name = get_canonical_name(current_raw_name, tvg_id, vnepg_id_map, vnepg_name_map)
                            dedup_key = remove_accents(display_name)
                            group = determine_group(display_name, tvg_id, vnepg_id_map)

                            raw_logo = ""
                            raw_match = re.search(r'tvg-logo="([^"]*)"', current_extinf, re.IGNORECASE)
                            if raw_match:
                                raw_logo = raw_match.group(1).strip()

                            final_logo = pick_logo(display_name, tvg_id, vnepg_id_map, vnepg_name_map,
                                                    iptvorg_name_to_id, iptvorg_id_to_logo, raw_logo)

                            if dedup_key not in channels_data:
                                channels_data[dedup_key] = {"name": display_name, "group": group,
                                                             "logo": final_logo, "urls": [line]}
                            else:
                                if line not in channels_data[dedup_key]["urls"]:
                                    channels_data[dedup_key]["urls"].append(line)
                                if not channels_data[dedup_key]["logo"] and final_logo:
                                    channels_data[dedup_key]["logo"] = final_logo

                            current_extinf = ""
                            current_raw_name = ""

                except Exception as e:
                    print(f"Loi khi xu ly {url}: {e}")

            print("Xuat ra listtivi.m3u...")
            final_ordered = OrderedDict()
            for g in GROUP_ORDER:
                sorted_keys = sorted(
                    [k for k, v in channels_data.items() if v["group"] == g],
                    key=lambda s: [int(t) if t.isdigit() else t for t in re.split(r'(\d+)', s)]
                )
                for k in sorted_keys:
                    final_ordered[k] = channels_data[k]
            leftover = [k for k in channels_data if k not in final_ordered]
            for k in sorted(leftover):
                final_ordered[k] = channels_data[k]

            with open("listtivi.m3u", "w", encoding="utf-8") as f:
                f.write('#EXTM3U url-tvg="https://vnepg.site/epg.xml.gz"\n')
                for data in final_ordered.values():
                    if not data["urls"]:
                        continue

                    logo_attr = f' tvg-logo="{data["logo"]}"' if data["logo"] else ""
                    group_logo_url = static_group_logos.get(data["group"], "")
                    group_logo_attr = f' group-logo="{group_logo_url}"' if group_logo_url else ""

                    for idx, u in enumerate(data["urls"]):
                        suffix = f" [Du phong {idx+1}]" if idx > 0 else ""
                        extinf = f'#EXTINF:-1{logo_attr}{group_logo_attr} group-title="{data["group"]}",{data["name"]}{suffix}'
                        f.write(f'{extinf}\n{u}\n')

            print("Build Success!")

        if __name__ == "__main__":
            main()
        EOF
        python3 optimize_m3u.py

        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add "listtivi.m3u"
        git commit -m "Feat: iptv-org channels.json name-matching + logos.json, URL validation to drop dead links, real broadcaster group-logos, robust dedup" || echo "No changes"
        git push
