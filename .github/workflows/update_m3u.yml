name: Auto Update M3U Daily

on:
  schedule:
    # Chạy tự động vào lúc 00:00 UTC hàng ngày (khoảng 07:00 sáng giờ Việt Nam)
    - cron: '0 0 * * *'
  workflow_dispatch: # Cho phép bấm nút chạy thủ công bất cứ lúc nào

jobs:
  update-list:
    runs-on: ubuntu-latest

    steps:
    # Bước 1: Checkout code của repository về máy ảo
    - name: Checkout repository
      uses: actions/checkout@v4

    # Bước 2: Tải, xử lý và chuẩn hóa file M3U bằng Python
    - name: Fetch, Clean and Standardize M3U
      run: |
        python3 -c '
        import urllib.request

        url = "https://raw.githubusercontent.com/DinhLap96/ListTivi/refs/heads/main/ListTiVi/dltivi_v2.ndl"
        req = urllib.request.Request(url, headers={"User-Agent": "Mozilla/5.0"})
        
        try:
            with urllib.request.urlopen(req) as response:
                # "utf-8-sig" sẽ tự động phát hiện và XÓA bỏ ký tự BOM ẩn đầu file
                content = response.read().decode("utf-8-sig")
        except Exception as e:
            print(f"Lỗi khi tải dữ liệu: {e}")
            exit(1)

        cleaned_lines = []
        for line in content.splitlines():
            line = line.strip() # Xóa khoảng trắng thừa ở đầu/cuối dòng
            
            # CHỈ GIỮ LẠI: Dòng header, Dòng thông tin kênh, và Đường dẫn luồng phát
            if line.startswith("#EXTM3U") or line.startswith("#EXTINF") or line.startswith("http://") or line.startswith("https://"):
                cleaned_lines.append(line)

        # Ghi lại thành file listtivi.m3u chuẩn chỉnh
        with open("listtivi.m3u", "w", encoding="utf-8") as f:
            f.write("\n".join(cleaned_lines) + "\n")
            
        print("Đã chuẩn hóa và làm sạch file M3U thành công!")
        '

    # Bước 3: Commit và Push file đã cập nhật lên GitHub
    - name: Commit and Push changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add "listtivi.m3u"
        
        # Chỉ commit nếu file có sự thay đổi dữ liệu
        if git diff --staged --quiet; then
          echo "Không có thay đổi nào được tìm thấy."
        else
          git commit -m "Auto-update & Clean M3U list từ nguồn DinhLap96"
          git push
        fi
