name: Auto Update M3U Daily

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  
jobs:
  update-list:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v5

    - name: Install Real Browser Dependencies (Xvfb & SeleniumBase)
      run: |
        sudo apt-get update
        sudo apt-get install -y xvfb
        python -m pip install --upgrade pip
        pip install seleniumbase
        seleniumbase install chromedriver

    - name: Fetch VNEPG API via Undetected Real Browser
      run: |
        cat << 'EOF' > get_vnepg.py
        import json, os, shutil, xml.etree.ElementTree as ET
        from seleniumbase import SB

        api_url = "https://vnepg.site/api/channels"
        xml_url = "https://vnepg.site/epg.xml"
        raw_file = "vnepg_raw.json"
        backup_file = "vnepg_backup.json"

        success = False
        print("Lớp 1: Khởi động Trình duyệt thật để vượt Cloudflare...")
        try:
            with SB(uc=True, xvfb=True, headless=True) as sb:
                sb.driver.get(api_url)
                sb.sleep(15)
                page_text = sb.driver.find_element("css selector", "body").text
                if page_text.strip().startswith("{"):
                    data = json.loads(page_text)
                    if "channels" in data and len(data["channels"]) > 0:
                        with open(raw_file, "w", encoding="utf-8") as f:
                            json.dump(data, f, ensure_ascii=False, indent=4)
                        with open(backup_file, "w", encoding="utf-8") as f:
                            json.dump(data, f, ensure_ascii=False, indent=4)
                        success = True
        except Exception as e:
            print(f"Lỗi: {e}")

        if not success and os.path.exists(backup_file):
            shutil.copy(backup_file, raw_file)
            print("Đã khôi phục từ Backup.")
        EOF
        python3 get_vnepg.py

    - name: Process and Fully Merge M3U List
      run: |
        cat << 'EOF' > optimize_m3u.py
        import re, json, os, urllib.request, difflib
        from collections import OrderedDict

        def normalize(name):
            name = re.sub(r'\[.*?\]|\(.*?\)', '', name)
            return re.sub(r'[^a-z0-9]', '', name.lower())

        urls = [
            "https://raw.githubusercontent.com/DinhLap96/ListTivi/refs/heads/main/ListTiVi/dltivi_v2.ndl",
            "https://raw.githubusercontent.com/iptv-org/iptv/refs/heads/master/streams/vn.m3u"
        ]

        channels, registry = OrderedDict(), {}
        if os.path.exists("vnepg_backup.json"):
            with open("vnepg_backup.json", "r", encoding="utf-8") as f:
                data = json.load(f)
                for ch in data.get("channels", []):
                    registry[normalize(ch["name"])] = ch

        used_urls = set()
        for url in urls:
            try:
                with urllib.request.urlopen(urllib.request.Request(url, headers={"User-Agent": "Mozilla/5.0"})) as res:
                    lines = res.read().decode("utf-8-sig").splitlines()
                current_key = None
                for line in lines:
                    if line.startswith("#EXTINF"):
                        raw_name = line.rsplit(",", 1)[-1].strip()
                        norm_name = normalize(raw_name)
                        best_match = difflib.get_close_matches(norm_name, registry.keys(), n=1, cutoff=0.7)
                        key = registry[best_match[0]]["name"] if best_match else raw_name
                        info = registry[best_match[0]] if best_match else {"id": "", "logo": ""}
                        if key not in channels:
                            channels[key] = {"id": info.get("id", ""), "logo": info.get("logo", ""), "urls": []}
                        current_key = key
                    elif current_key and line.startswith("http"):
                        if line not in used_urls:
                            channels[current_key]["urls"].append(line)
                            used_urls.add(line)
            except: pass

        with open("listtivi.m3u", "w", encoding="utf-8") as f:
            f.write("#EXTM3U url-tvg=\"https://vnepg.site/epg.xml\"\n")
            for name, data in channels.items():
                for i, url in enumerate(data["urls"]):
                    suffix = f" [Dự phòng {i}]" if i > 0 else ""
                    f.write(f'#EXTINF:-1 tvg-id="{data["id"]}" tvg-logo="{data["logo"]}" group-title="Truyền Hình",{name}{suffix}\n{url}\n')
        EOF
        python3 optimize_m3u.py

    - name: Commit and Push changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add "listtivi.m3u" "vnepg_backup.json" || true
        git commit -m "Auto-update & Tối ưu hóa ghép nhóm kênh" || echo "Không có thay đổi"
        git push
