name: Auto Update M3U Daily

on:
  schedule:
    # Chạy tự động vào lúc 00:00 UTC hàng ngày (khoảng 07:00 sáng giờ Việt Nam)
    - cron: '0 0 * * *'
  workflow_dispatch: # Cho phép bấm nút chạy thủ công bất cứ lúc nào

# Thêm cấu hình môi trường ở cấp độ toàn workflow
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  
jobs:
  update-list:
    runs-on: ubuntu-latest

    steps:
    # Bước 1: Checkout code của repository về máy ảo
    - name: Checkout repository
      uses: actions/checkout@v5

    # Bước 2: Tải và Tối ưu hóa cấu trúc M3U chuyên nghiệp bằng Python
    - name: Fetch and Fully Optimize M3U
      run: |
        cat << 'EOF' > optimize_m3u.py
        import urllib.request
        import re
        from collections import OrderedDict

        url = "https://raw.githubusercontent.com/DinhLap96/ListTivi/refs/heads/main/ListTiVi/dltivi_v2.ndl"
        req = urllib.request.Request(url, headers={"User-Agent": "Mozilla/5.0"})
        
        try:
            with urllib.request.urlopen(req) as response:
                content = response.read().decode("utf-8-sig")
        except Exception as e:
            print(f"Lỗi tải file: {e}")
            exit(1)

        channels = OrderedDict()
        lines = content.splitlines()

        # Hàm bóc tách thuộc tính và làm sạch dữ liệu
        def parse_attributes(line):
            tvg_id = ""
            group_title = ""
            tvg_logo = ""
            
            id_match = re.search(r'tvg-id="([^"]*)"', line)
            group_match = re.search(r'group-title="([^"]*)"', line)
            logo_match = re.search(r'tvg-logo="([^"]*)"', line)
            
            if id_match: tvg_id = id_match.group(1).strip()
            if group_match: group_title = group_match.group(1).strip()
            if logo_match: tvg_logo = logo_match.group(1).strip()
            
            name = ""
            if "," in line:
                name = line.rsplit(",", 1)[1].strip()
            return tvg_id, group_title, tvg_logo, name

        last_key = None

        for line in lines:
            line_str = line.strip()
            if not line_str or line_str.startswith("#EXTM3U") or line_str.startswith("#PLAYLISTINF"):
                continue
            
            if line_str.startswith("#EXTINF"):
                tvg_id, group_title, tvg_logo, name = parse_attributes(line_str)
                if not name:
                    name = tvg_id if tvg_id else "Kênh Không Tên"
                
                # Tạo Khóa Định Danh kết hợp giữa Nhóm và Tên Kênh để gom cụm
                key = (group_title, name)
                if key not in channels:
                    channels[key] = {
                        "tvg-id": tvg_id,
                        "group-title": group_title,
                        "tvg-logo": tvg_logo,
                        "urls": []
                    }
                else:
                    # Bổ sung thuộc tính nếu luồng quét sau có mà luồng trước thiếu
                    if not channels[key]["tvg-id"] and tvg_id: channels[key]["tvg-id"] = tvg_id
                    if not channels[key]["tvg-logo"] and tvg_logo: channels[key]["tvg-logo"] = tvg_logo
                last_key = key
                
            elif line_str.startswith("http://") or line_str.startswith("https://"):
                if last_key and last_key in channels:
                    # Lọc trùng link tuyệt đối cho cùng một kênh
                    if line_str not in channels[last_key]["urls"]:
                        channels[last_key]["urls"].append(line_str)

        # Tiến hành xuất file M3U chuẩn hóa cấu trúc 100%
        output_lines = ["#EXTM3U url-tvg=\"https://vnepg.site/epg.xml\""]

        for (group, name), info in channels.items():
            urls = info["urls"]
            if not urls:
                continue
            
            # Xây dựng chuỗi thuộc tính sạch (Bỏ qua các thẻ rác rỗng)
            attrs = []
            if info["tvg-id"]: attrs.append(f'tvg-id="{info["tvg-id"]}"')
            if info["group-title"]: attrs.append(f'group-title="{info["group-title"]}"')
            if info["tvg-logo"]: attrs.append(f'tvg-logo="{info["tvg-logo"]}"')
            
            attr_str = " " + " ".join(attrs) if attrs else ""
            
            # Xuất link luồng phát chính
            output_lines.append(f"#EXTINF:-1{attr_str},{name}")
            output_lines.append(urls[0])
            
            # Xuất các link luồng phát dự phòng ngay phía dưới
            for i, url_bak in enumerate(urls[1:], start=1):
                output_lines.append(f"#EXTINF:-1{attr_str},{name} [Dự phòng {i}]")
                output_lines.append(url_bak)

        with open("listtivi.m3u", "w", encoding="utf-8") as f:
            f.write("\n".join(output_lines) + "\n")

        print("Đã tối ưu hóa cấu trúc danh sách thành công!")
        EOF
        python3 optimize_m3u.py

    # Bước 3: Commit và Push file đã cập nhật lên GitHub
    - name: Commit and Push changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add "listtivi.m3u"
        
        # Chỉ commit nếu file có sự thay đổi dữ liệu
        if git diff --staged --quiet; then
          echo "Không có thay đổi nào được tìm thấy."
        else
          git commit -m "Auto-update & Tối ưu cấu trúc M3U nâng cao"
          git push
        fi
