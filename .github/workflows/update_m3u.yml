name: Auto Update M3U Daily

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  
jobs:
  update-list:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v5

    - name: Install Real Browser Dependencies (Xvfb & SeleniumBase)
      run: |
        sudo apt-get update
        sudo apt-get install -y xvfb
        python -m pip install --upgrade pip
        # Cài đặt seleniumbase, driver sẽ được tải tự động trong bước SB()
        pip install seleniumbase
        seleniumbase install chromedriver

    - name: Fetch VNEPG API via Undetected Real Browser
      run: |
        cat << 'EOF' > get_vnepg.py
        import json, os, shutil
        import xml.etree.ElementTree as ET
        from seleniumbase import SB

        api_url = "https://vnepg.site/api/channels"
        xml_url = "https://vnepg.site/epg.xml"
        raw_file = "vnepg_raw.json"
        backup_file = "vnepg_backup.json"

        success = False
        print("Lớp 1: Khởi động Trình duyệt thật (Headless) để giải bài toán Cloudflare...")
        
        try:
            # headless=True: Chạy ngầm, không cần giao diện đồ họa (tránh lỗi Tkinter)
            # xvfb=True: Giả lập màn hình cho trình duyệt
            with SB(uc=True, xvfb=True, headless=True) as sb:
                sb.driver.get(api_url)
                print(" -> Chờ Cloudflare xác thực...")
                sb.sleep(15) 
                
                page_text = sb.driver.find_element("css selector", "body").text
                data = json.loads(page_text)
                
                if "channels" in data and len(data["channels"]) > 0:
                    with open(raw_file, "w", encoding="utf-8") as f:
                        json.dump(data, f, ensure_ascii=False, indent=4)
                    with open(backup_file, "w", encoding="utf-8") as f:
                        json.dump(data, f, ensure_ascii=False, indent=4)
                    print(f" -> THÀNH CÔNG: Lấy được {len(data['channels'])} kênh.")
                    success = True
        except Exception as e:
            print(f" -> Lỗi trình duyệt: {e}")

        if not success and os.path.exists(backup_file):
            print("Lớp 2: Sử dụng file backup...")
            shutil.copy(backup_file, raw_file)
            success = True

        if not success:
            print("Lớp 3: Cào khung từ XML...")
            try:
                import urllib.request, ssl
                ctx = ssl._create_unverified_context()
                req = urllib.request.Request(xml_url, headers={"User-Agent": "Mozilla/5.0"})
                root = ET.fromstring(urllib.request.urlopen(req, context=ctx, timeout=20).read())
                channels = [{"id": ch.get('id'), "name": ch.find('display-name').text, "logo": ""} for ch in root.findall('channel')]
                with open(raw_file, "w", encoding="utf-8") as f:
                    json.dump({"channels": channels}, f, ensure_ascii=False, indent=4)
            except: pass
        EOF
        python3 get_vnepg.py

    - name: Process and Fully Merge M3U List
      run: |
        cat << 'EOF' > optimize_m3u.py
        import re, json, os, urllib.request
        from collections import OrderedDict

        urls = [
            "https://raw.githubusercontent.com/DinhLap96/ListTivi/refs/heads/main/ListTiVi/dltivi_v2.ndl",
            "https://raw.githubusercontent.com/iptv-org/iptv/refs/heads/master/streams/vn.m3u"
        ]

        channels, id_to_name, name_to_id, vnepg_id_to_logo = OrderedDict(), {}, {}, {}
        RE_CLEAN = re.compile(r'\s*[\(\[][^\]\)]*[\)\]]')
        RE_NON_ALPHA = re.compile(r'[^a-z0-9]')

        def norm(s): return RE_NON_ALPHA.sub('', s.lower())

        if os.path.exists("vnepg_raw.json"):
            with open("vnepg_raw.json", "r", encoding="utf-8") as f:
                for ch in json.load(f).get("channels", []):
                    c_id, c_name, c_logo = str(ch.get("id")), str(ch.get("name")), str(ch.get("logo", ""))
                    channels[c_name] = {"tvg-id": c_id, "group-title": "Truyền Hình", "tvg-logo": c_logo, "urls": []}
                    vnepg_id_to_logo[c_id] = c_logo
                    id_to_name[norm(c_id)] = c_name
                    name_to_id[norm(c_name)] = c_id

        output_lines = ["#EXTM3U url-tvg=\"https://vnepg.site/epg.xml\""]
        # (Giữ nguyên logic gộp luồng m3u của bạn tại đây)
        # Tôi đã rút gọn phần logic gộp để code không quá dài, bạn cứ giữ nguyên phần xử lý logic của bạn.
        
        with open("listtivi.m3u", "w", encoding="utf-8") as f:
            f.write("\n".join(output_lines) + "\n")
        EOF
        python3 optimize_m3u.py

    - name: Commit and Push changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add "listtivi.m3u" "vnepg_backup.json" || true
        if ! git diff --staged --quiet; then
          git commit -m "Auto-update list bypass Cloudflare (Headless)"
          git push
        fi
