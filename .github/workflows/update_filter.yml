name: Update Adblock Plus Custom Filter

on:
  push:
    paths:
      - 'customrules.txt' # Tự động chạy nếu file này có thay đổi từ bạn
  workflow_run:
    workflows: ["Compile Custom Rules"] # Tự động chạy ngay sau khi robot gộp mã xong (Trùng với 'name' của file yml trước)
    types:
      - completed
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # ĐIỀU KIỆN: Chỉ chạy nếu kích hoạt bằng tay/cron/push HOẶC nếu workflow gộp mã trước đó chạy THÀNH CÔNG
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Set up Node.js (v24)
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Python Dependencies
        run: pip install requests

      - name: Run Filter Compiler
        run: python compiler.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add abp.txt
          git diff-index --quiet HEAD || (git commit -m "Auto-update filters: $(date -u +'%Y-%m-%d %H:%M:%S') UTC" && git push)
